<svg id="pixel-travel-poster" xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="日本关西 5 日城市初游 poster">
  <defs>
    <pattern id="atlas-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(49,61,76,0.12)" stroke-width="1"/>
    </pattern>
    <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
    </marker>
  </defs>
  <style>
    .poster-bg { fill: #f6ecd9; }
    .poster-frame { fill: #fffaf0; stroke: #313d4c; stroke-width: 4; }
    .poster-kicker { fill: #7a3e9d; font: 700 22px "Courier New", monospace; }
    .poster-title { fill: #26313d; font: 700 42px "Courier New", monospace; }
    .poster-meta { fill: #697386; font: 700 20px "Courier New", monospace; }
    .section-title { fill: #26313d; font: 700 28px "Courier New", monospace; }
    .distance-note { fill: #697386; font: 700 16px "Courier New", monospace; }
    .atlas-water { fill: #d9edf0; }
    .atlas-frame-inner { fill: rgba(255,255,255,0.25); stroke: #313d4c; stroke-width: 2; }
    .map-title, .north { fill: #26313d; font: 700 18px "Courier New", monospace; }
    .route { fill: none; stroke: #d64f3f; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; stroke-dasharray: 12 7; }
    .arrow-head { fill: #d64f3f; }
    .distance-label { paint-order: stroke; stroke: #fffaf0; stroke-width: 5; fill: #313d4c; font: 700 13px "Courier New", monospace; }
    .city-label { paint-order: stroke; stroke: #fffaf0; stroke-width: 6; fill: #7a3e9d; font: 700 17px "Courier New", monospace; }
    .marker-halo { fill: rgba(31,122,140,0.14); }
    .marker-box { fill: #1f7a8c; stroke: #313d4c; stroke-width: 2; }
    .marker-num { fill: #fffaf0; font: 700 16px "Courier New", monospace; }
    .poi-label { paint-order: stroke; stroke: #fffaf0; stroke-width: 5; fill: #26313d; font: 700 15px "Courier New", monospace; }
    .poi-day { paint-order: stroke; stroke: #fffaf0; stroke-width: 4; fill: #697386; font: 700 11px "Courier New", monospace; }
    .scale-bar line { stroke: #313d4c; stroke-width: 3; }
    .scale-bar text { fill: #313d4c; font: 700 13px "Courier New", monospace; }
    .poster-day rect { fill: #ffffff; stroke: #313d4c; stroke-width: 2; }
    .poster-day-num { fill: #1f7a8c; font: 700 20px "Courier New", monospace; }
    .poster-day-title { fill: #26313d; font: 700 18px "Courier New", monospace; }
    .poster-day-stops { fill: #697386; font: 700 16px "Courier New", monospace; }
</style>
  <rect width="1600" height="1130" class="poster-bg"/>
  <rect x="64" y="56" width="1472" height="1018" class="poster-frame"/>
  <text x="120" y="112" class="poster-kicker">PixelTravelMap · offline atlas poster</text>
  <text x="120" y="154" class="poster-title">日本关西 5 日城市初游</text>
  <text x="120" y="194" class="poster-meta">2024-11-01 - 2024-11-05 · 5 days · 4 cities · 9 stops · 194 km straight-line route</text>
  
  <g transform="translate(140,150)">
    <g class="poster-map-view">
      <rect width="1320" height="560" class="atlas-water"/>
      <rect width="1320" height="560" fill="url(#atlas-grid)"/>
      <rect x="28" y="28" width="1264" height="504" class="atlas-frame-inner"/>
      <text x="48" y="56" class="map-title">总览地图</text>
      <text x="1272" y="56" class="north" text-anchor="end">N ↑</text>
      <polyline class="route" points="536,528 512,544 808,128 800,128 792,168 872,528 688,104 752,72 168,536" marker-mid="url(#route-arrow)" marker-end="url(#route-arrow)"/>
      <text class="distance-label" x="524" y="526" text-anchor="middle">3 km</text><text class="distance-label" x="660" y="326" text-anchor="middle">45 km</text><text class="distance-label" x="804" y="118" text-anchor="middle">1 km</text><text class="distance-label" x="796" y="138" text-anchor="middle">4 km</text><text class="distance-label" x="832" y="338" text-anchor="middle">32 km</text><text class="distance-label" x="780" y="306" text-anchor="middle">40 km</text><text class="distance-label" x="720" y="78" text-anchor="middle">6 km</text><text class="distance-label" x="460" y="294" text-anchor="middle">64 km</text>
      <text class="city-label" x="524" y="496" text-anchor="middle">Osaka · JP</text><text class="city-label" x="768" y="40" text-anchor="middle">Kyoto · JP</text><text class="city-label" x="872" y="496" text-anchor="middle">Nara · JP</text><text class="city-label" x="168" y="504" text-anchor="middle">Kobe · JP</text>
      <g class="marker-layer" data-view="overview">
        
            <g class="marker marker-landmark" aria-label="大阪城">
              <circle class="marker-halo" cx="536" cy="528" r="18"/>
              <rect class="marker-box" x="521" y="513" width="30" height="30" rx="2"/>
              <text class="marker-num" x="536" y="533" text-anchor="middle">1</text>
              <text class="poi-label" x="560" y="520">大阪城</text>
              <text class="poi-day" x="560" y="538">Day 1 · Osaka</text>
            </g>
            
            <g class="marker marker-food" aria-label="道顿堀">
              <circle class="marker-halo" cx="512" cy="544" r="18"/>
              <rect class="marker-box" x="497" y="529" width="30" height="30" rx="2"/>
              <text class="marker-num" x="512" y="549" text-anchor="middle">2</text>
              <text class="poi-label" x="536" y="536">道顿堀</text>
              <text class="poi-day" x="536" y="554">Day 1 · Osaka</text>
            </g>
            
            <g class="marker marker-landmark" aria-label="清水寺">
              <circle class="marker-halo" cx="808" cy="128" r="18"/>
              <rect class="marker-box" x="793" y="113" width="30" height="30" rx="2"/>
              <text class="marker-num" x="808" y="133" text-anchor="middle">3</text>
              <text class="poi-label" x="832" y="120">清水寺</text>
              <text class="poi-day" x="832" y="138">Day 2 · Kyoto</text>
            </g>
            
            <g class="marker marker-experience" aria-label="二年坂">
              <circle class="marker-halo" cx="800" cy="128" r="18"/>
              <rect class="marker-box" x="785" y="113" width="30" height="30" rx="2"/>
              <text class="marker-num" x="800" y="133" text-anchor="middle">4</text>
              <text class="poi-label" x="824" y="120">二年坂</text>
              <text class="poi-day" x="824" y="138">Day 2 · Kyoto</text>
            </g>
            
            <g class="marker marker-landmark" aria-label="伏见稻荷大社">
              <circle class="marker-halo" cx="792" cy="168" r="18"/>
              <rect class="marker-box" x="777" y="153" width="30" height="30" rx="2"/>
              <text class="marker-num" x="792" y="173" text-anchor="middle">5</text>
              <text class="poi-label" x="816" y="160">伏见稻荷大社</text>
              <text class="poi-day" x="816" y="178">Day 3 · Kyoto</text>
            </g>
            
            <g class="marker marker-nature" aria-label="奈良公园">
              <circle class="marker-halo" cx="872" cy="528" r="18"/>
              <rect class="marker-box" x="857" y="513" width="30" height="30" rx="2"/>
              <text class="marker-num" x="872" y="533" text-anchor="middle">6</text>
              <text class="poi-label" x="896" y="520">奈良公园</text>
              <text class="poi-day" x="896" y="538">Day 3 · Nara</text>
            </g>
            
            <g class="marker marker-nature" aria-label="岚山竹林">
              <circle class="marker-halo" cx="688" cy="104" r="18"/>
              <rect class="marker-box" x="673" y="89" width="30" height="30" rx="2"/>
              <text class="marker-num" x="688" y="109" text-anchor="middle">7</text>
              <text class="poi-label" x="712" y="96">岚山竹林</text>
              <text class="poi-day" x="712" y="114">Day 4 · Kyoto</text>
            </g>
            
            <g class="marker marker-landmark" aria-label="金阁寺">
              <circle class="marker-halo" cx="752" cy="72" r="18"/>
              <rect class="marker-box" x="737" y="57" width="30" height="30" rx="2"/>
              <text class="marker-num" x="752" y="77" text-anchor="middle">8</text>
              <text class="poi-label" x="776" y="64">金阁寺</text>
              <text class="poi-day" x="776" y="82">Day 4 · Kyoto</text>
            </g>
            
            <g class="marker marker-experience" aria-label="神户临海乐园">
              <circle class="marker-halo" cx="168" cy="536" r="18"/>
              <rect class="marker-box" x="153" y="521" width="30" height="30" rx="2"/>
              <text class="marker-num" x="168" y="541" text-anchor="middle">9</text>
              <text class="poi-label" x="192" y="528">神户临海乐园</text>
              <text class="poi-day" x="192" y="546">Day 5 · Kobe</text>
            </g>
            
      </g>
      
      <g class="scale-bar">
        <line x1="48" y1="512" x2="189" y2="512" />
        <line x1="48" y1="504" x2="48" y2="520" />
        <line x1="189" y1="504" x2="189" y2="520" />
        <text x="118" y="498" text-anchor="middle">≈ 10 km</text>
      </g>

    </g>
  </g>

  <text x="120" y="752" class="section-title">完整行程</text>
  <text x="1460" y="752" class="distance-note" text-anchor="end">距离为经纬度直线近似值</text>
  
  <g class="poster-day" transform="translate(120,790)">
    <rect width="1360" height="50" rx="4"/>
    <text x="20" y="24" class="poster-day-num">Day 1</text>
    <text x="112" y="24" class="poster-day-title">2024-11-01 · 大阪城与夜景街区</text>
    <text x="112" y="40" class="poster-day-stops">大阪城 (Osaka, 150m) · 道顿堀 (Osaka, 120m)</text>
  </g>

  <g class="poster-day" transform="translate(120,848)">
    <rect width="1360" height="50" rx="4"/>
    <text x="20" y="24" class="poster-day-num">Day 2</text>
    <text x="112" y="24" class="poster-day-title">2024-11-02 · 京都清水寺与街巷</text>
    <text x="112" y="40" class="poster-day-stops">清水寺 (Kyoto, 150m) · 二年坂 (Kyoto, 80m)</text>
  </g>

  <g class="poster-day" transform="translate(120,906)">
    <rect width="1360" height="50" rx="4"/>
    <text x="20" y="24" class="poster-day-num">Day 3</text>
    <text x="112" y="24" class="poster-day-title">2024-11-03 · 伏见稻荷与奈良</text>
    <text x="112" y="40" class="poster-day-stops">伏见稻荷大社 (Kyoto, 150m) · 奈良公园 (Nara, 160m)</text>
  </g>

  <g class="poster-day" transform="translate(120,964)">
    <rect width="1360" height="50" rx="4"/>
    <text x="20" y="24" class="poster-day-num">Day 4</text>
    <text x="112" y="24" class="poster-day-title">2024-11-04 · 岚山与金阁寺</text>
    <text x="112" y="40" class="poster-day-stops">岚山竹林 (Kyoto, 100m) · 金阁寺 (Kyoto, 90m)</text>
  </g>

  <g class="poster-day" transform="translate(120,1022)">
    <rect width="1360" height="50" rx="4"/>
    <text x="20" y="24" class="poster-day-num">Day 5</text>
    <text x="112" y="24" class="poster-day-title">2024-11-05 · 神户港区收尾</text>
    <text x="112" y="40" class="poster-day-stops">神户临海乐园 (Kobe, 150m)</text>
  </g>

</svg>
