hub .marker-box{fill:var(--map-ink)}.marker-num{fill:#fff;font:750 14px Inter,"Segoe UI",sans-serif}.label-leader{stroke:rgba(36,63,53,.5);stroke-width:1.2}.poi-label-bg{fill:rgba(255,253,242,.94);stroke:rgba(73,75,52,.28);stroke-width:1}.poi-label{pointer-events:none;fill:var(--map-ink);font:750 13px "STKaiti","KaiTi","Microsoft YaHei",serif}.poi-day{pointer-events:none;fill:#6e6653;font:600 11px Inter,"Segoe UI",sans-serif}.map-legend rect{fill:rgba(255,253,242,.88);stroke:rgba(73,75,52,.28)}.map-legend text{fill:#625a49;font:650 11px Inter,"Segoe UI",sans-serif}.map-legend line{stroke:#a93b32;stroke-width:3}
        .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line)}.stat-item{padding:12px;border-right:1px solid var(--line);background:var(--paper-2)}.stat-item:last-child{border-right:0}.stat-item span{display:block;color:var(--muted);font-size:11px}.stat-item strong{display:block;margin-top:5px;font-size:18px}.side-panel{display:grid;gap:0;overflow:hidden}.panel-section{padding:14px;border-bottom:1px solid var(--line)}.panel-section:last-child{border-bottom:0}.itinerary-list{display:grid;gap:12px}.day-block{display:grid;gap:6px;border-left:3px solid var(--focus);padding-left:10px}.day-summary{color:var(--muted);font-size:12px;line-height:1.4}.day-brief-meta{margin:-2px 0 8px;padding:7px 9px;border-left:3px solid #d89b17;background:#fff8dc;color:var(--ink);font-size:11px;line-height:1.45}.schedule-item{width:100%;display:grid;grid-template-columns:28px 1fr;gap:10px;text-align:left;border:1px solid var(--line);border-radius:6px;background:var(--paper-2);padding:8px;cursor:pointer}.schedule-item.active{border-color:var(--focus);background:#d9efeb}.schedule-item.focus-city{opacity:.45}.schedule-item.in-city{opacity:1}.schedule-index{display:grid;place-items:center;width:26px;height:26px;border-radius:50%;background:var(--marker);color:#fff;font-weight:700}.schedule-item strong{display:block;font-size:13px}.schedule-item small{display:block;color:var(--muted);font-size:11px;margin-top:3px}.poi-card{display:grid;gap:8px}.empty-state{color:var(--muted);font-size:13px}.poi-meta{margin:0;color:var(--muted);font-size:12px}.poi-actions{display:flex;gap:8px;flex-wrap:wrap}.poi-actions a{border:1px solid var(--line-strong);border-radius:5px;background:#fff;color:var(--ink);padding:6px 8px;text-decoration:none;font-weight:700}.source-note{padding:8px 10px;border-left:3px solid var(--focus);background:#f5f8f7;color:var(--muted);font-size:11px;line-height:1.45}.poster-tools{display:grid;gap:14px}.collaboration-tools{display:grid;gap:9px}.collaboration-actions{display:grid;gap:8px}.collaboration-status{margin:0;color:var(--muted);font-size:11px;line-height:1.45}.collaboration-status.ok{color:#16724b}.collaboration-status.error{color:#b42318}.file-button{display:grid;place-items:center;cursor:pointer}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.poster-controls,.notes-editor{display:grid;gap:10px}.inline-controls{display:grid;grid-template-columns:minmax(0,1fr) 150px;gap:8px}.field-label{display:grid;gap:6px;color:var(--muted);font-size:12px;font-weight:700}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);padding:8px}textarea{min-height:72px;resize:vertical}.briefing-view{display:grid;gap:14px;max-width:880px;margin:0 auto;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 16px 40px var(--shadow);overflow:hidden}.briefing-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line);background:#f5f8f7}.briefing-toolbar h2{margin:0}.briefing-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}#briefing-content{padding:0 18px 20px}.briefing-hero{display:grid;gap:6px;padding:18px 0;border-bottom:1px solid var(--line)}.briefing-date{color:var(--focus);font-size:12px;font-weight:750;text-transform:uppercase}.briefing-hero h3{margin:0;font-size:26px}.briefing-summary{margin:0;color:var(--muted);line-height:1.55}.briefing-facts{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:14px 0}.briefing-fact{padding:11px;border-left:3px solid var(--focus);background:#f5f8f7}.briefing-fact span{display:block;color:var(--muted);font-size:11px}.briefing-fact strong{display:block;margin-top:4px;font-size:14px}.briefing-caution{margin:0 0 14px;padding:11px 12px;border-left:3px solid #d89b17;background:#fff8dc;line-height:1.5}.briefing-timeline <body>
  <script id="trip-data" type="application/json">{"schema_version":"1.0","trip_title":"PixelTravelMap 分享查看器","start_date":"2026-01-01","end_date":"2026-01-01","travelers":["traveler"],"budget_cny":null,"transport":"unknown","style_theme":"ancient-atlas","lang":"zh-CN","days":[{"day":1,"date":"2026-01-01","summary":"请通过 PixelTravelMap 生成的分享链接打开此页面。","meeting_time":null,"meeting_point":"","cautions":"","stops":[{"id":"share-viewer-placeholder","name":"等待分享数据","name_en":null,"city":"PixelTravelMap","country":"WEB","lat":0,"lon":0,"crs":"wgs84","category":"transit","duration_min":0,"arrival_time":null,"reservation_required":false,"reservation_time":null,"reservation_reference":"","transit_buffer_min":0,"cautions":"","description":"此页面需要分享链接中的行程数据。","notes":"请让行程组织者重新复制分享链接。","source":"PixelTravelMap","source_url":null,"official_url":null,"navigation_url":null,"info_missing":false}]}]}</script>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">PixelTravelMap Atlas</p>
        <h1>PixelTravelMap 分享查看器</h1>
        <p class="atlas-note">方位和距离基于 POI 经纬度计算，路线距离为直线近似值，不等同于实际驾车或步行距离。</p>
      </div>
      <div class="toolbar">
        <button class="text-button view-button active" id="map-view-button" type="button">地图</button>
        <button class="text-button view-button" id="briefing-view-button" type="button">明日简报</button>
        <button class="icon-button" id="overview-button" type="button" title="返回总览" aria-label="返回总览">↩</button>
        <button class="text-button" id="download-html" type="button">保存 HTML</button>
      </div>
    </header>
    <main class="workspace" id="map-workspace">
      <section class="map-stage" aria-label="经纬度旅行地图">
        <div class="map-toolbar">
          <span id="view-label">总览地图</span>
          <div class="city-pills" id="city-pills" aria-label="地图范围"></div>
        </div>
        <div id="map-container"><svg id="pixel-map" class="pixel-map" viewBox="0 0 1040 620"></svg></div>
        <div class="stats-bar" id="stats-bar"></div>
      </section>
      <aside class="side-panel">
        <section class="panel-section">
          <h2>完整行程</h2>
          <div id="itinerary-list" class="itinerary-list"><!-- data-stop-index hydrated by runtime --></div>
        </section>
        <section class="panel-section">
          <h2>地标详情</h2>
          <article id="poi-card" class="poi-card" aria-live="polite">
            <p class="empty-state">点击地图编号或日程项查看详情。</p>
          </article>
        </section>
        <section class="panel-section collaboration-tools">
          <h2>分享与同行协作</h2>
          <label class="field-label" for="collaborator-name">你的名字</label>
          <input id="collaborator-name" type="text" placeholder="用于标记备注更新来源">
          <div class="collaboration-actions">
            <button class="text-button compact" id="copy-trip-link" type="button">复制行程分享链接</button>
            <button class="text-button compact" id="export-notes" type="button">导出协作更新包</button>
            <label class="text-button compact file-button" for="import-notes">导入更新包</label>
            <input id="import-notes" class="sr-only" type="file" accept=".json,application/json">
          </div>
          <p id="collaboration-status" class="collaboration-status" aria-live="polite">链接中的行程和备注位于 URL fragment，不会随页面请求发送给服务器。</p>
        </section>
        <section class="panel-section poster-tools">
          <h2>Poster 工具</h2>
          <div class="poster-controls">
            <button class="text-button compact" id="download-overview-poster" type="button">下载总行程 poster</button>
            <label class="field-label" for="poster-day-select">每日简报</label>
            <div class="inline-controls">
              <select id="poster-day-select"></select>
              <button class="text-button compact" id="download-day-poster" type="button">下载每日 poster</button>
            </div>
            <button class="text-button compact" id="download-record-poster" type="button">下载旅行记录 poster</button>
          </div>
          <div class="notes-editor">
            <label class="field-label" for="trip-note">全程备注 / 结束总结</label>
            <textarea id="trip-note" rows="3" placeholder="旅行前可写整体提醒；旅行后可写总结。"></textarea>
            <label class="field-label" for="day-note">当前 Day 备注</label>
            <textarea id="day-note" rows="3" placeholder="写给同行朋友的明日注意事项，或当天记录。"></textarea>
            <label class="field-label" for="stop-note">当前地点备注</label>
            <textarea id="stop-note" rows="3" placeholder="记录某个地点的临时变化、体验或提醒。"></textarea>
            <button class="text-button compact danger" id="clear-notes" type="button">清空备注</button>
          </div>
        </section>
      </aside>
    </main>
    <section class="briefing-view" id="briefing-view" hidden>
      <div class="briefing-toolbar">
        <div>
          <p class="eyebrow">Tomorrow briefing</p>
          <h2>同行明日简报</h2>
        </div>
        <div class="briefing-actions">
          <select id="briefing-day-select" aria-label="选择简报日期"></select>
          <button class="text-button" id="copy-briefing-link" type="button">复制简报链接</button>
          <button class="text-button" id="briefing-back" type="button">返回地图</button>
        </div>
      </div>
      <div id="briefing-content"></div>
    </section>
  </div>
  <script>const MAP_W = 1040;
const MAP_H = 620;
const SHARE_VIEWER_URL = "https://leoxin99.github.io/PixelTravelMap/dist/viewer.html";
function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

function text(value, fallback = "") {
      const raw = String(value ?? "").trim();
      return raw || fallback;
    }

function trimText(value, limit) {
      const raw = text(value);
      return raw.length <= limit ? raw : raw.slice(0, limit - 1) + "…";
    }

function fileSafe(value) {
      return text(value, "pixel-travel-map").replace(/[\\/:*?"<>|]+/g, "-").replace(/\s+/g, "-");
    }

function encodeBase64Url(value) {
      const bytes = new TextEncoder().encode(value);
      let binary = "";
      bytes.forEach(byte => { binary += String.fromCharCode(byte); });
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

function decodeBase64Url(value) {
      const padded = value.replace(/-/g, "+").replace(/_/g, "/") + "===".slice((value.length + 3) % 4);
      const binary = atob(padded);
      return new TextDecoder().decode(Uint8Array.from(binary, char => char.charCodeAt(0)));
    }

function readSharePayload() {
      try {
        const params = new URLSearchParams(location.hash.replace(/^#/, ""));
        const value = params.get("ptm");
        return value ? JSON.parse(decodeBase64Url(value)) : null;
      } catch {
        return null;
      }
    }

function compactTripForShare(source) {
      return {
        v: source.schema_version, t: source.trip_title, s: source.start_date, e: source.end_date,
        r: source.travelers, b: source.budget_cny, x: source.transport, y: source.style_theme, l: source.lang,
        d: source.days.map(day => [
          day.day, day.date, day.summary || "", day.meeting_time || null,
          day.meeting_point || "", day.cautions || "",
          day.stops.map(stop => [
            stop.id, stop.name, stop.name_en || null, stop.city, stop.country,
            stop.lat, stop.lon, stop.crs, stop.category, stop.duration_min,
            stop.arrival_time || null, Boolean(stop.reservation_required),
            stop.reservation_time || null, stop.reservation_reference || "",
            stop.transit_buffer_min ?? 20, stop.cautions || "",
            stop.description || null, stop.notes || "", stop.source || "shared_link",
            stop.source_url || null, stop.official_url || null,
            stop.navigation_url || null, Boolean(stop.info_missing)
          ])
        ])
      };
    }

function expandSharedTrip(value) {
      if (value && value.schema_version && value.days) return value;
      return {
        schema_version: value.v || "1.0", trip_title: value.t, start_date: value.s, end_date: value.e,
        travelers: value.r || ["traveler"], budget_cny: value.b ?? null, transport: value.x || "mixed",
        style_theme: value.y || "pastel-pixel", lang: value.l || "zh-CN",
        days: (value.d || []).map(day => ({
          day: day[0], date: day[1], summary: day[2] || "", meeting_time: day[3] || null,
          meeting_point: day[4] || "", cautions: day[5] || "",
          stops: (day[6] || []).map(stop => ({
            id: stop[0], name: stop[1], name_en: stop[2], city: stop[3], country: stop[4],
            lat: stop[5], lon: stop[6], crs: stop[7], category: stop[8], duration_min: stop[9],
            arrival_time: stop[10] || null, reservation_required: Boolean(stop[11]),
            reservation_time: stop[12] || null, reservation_reference: stop[13] || "",
            transit_buffer_min: stop[14] ?? 20, cautions: stop[15] || "",
            description: stop[16] || null, notes: stop[17] || "", source: stop[18] || "shared_link",
            source_url: stop[19] || null, official_url: stop[20] || null,
            navigation_url: stop[21] || null, info_missing: Boolean(stop[22])
          }))
        }))
      };
    }

function emptyTripNotes(actor = "") {
      return { version: 2, actor, trip: null, days: {}, stops: {}, updatedAt: new Date(0).toISOString() };
    }

function noteRecord(value, actor, updatedAt = new Date().toISOString()) {
      return { value: String(value || ""), actor: String(actor || "同行者"), updatedAt };
    }

function noteValue(value) {
      if (typeof value === "string") return value;
      return value && typeof value.value === "string" ? value.value : "";
    }

function normalizeTripNotes(raw) {
      if (!raw || typeof raw !== "object") return emptyTripNotes();
      if (raw.version === 2) {
        return {
          version: 2, actor: raw.actor || "", trip: raw.trip || null,
          days: raw.days || {}, stops: raw.stops || {},
          updatedAt: raw.updatedAt || new Date(0).toISOString()
        };
      }
      const migrated = emptyTripNotes(raw.actor || "");
      if (raw.trip) migrated.trip = noteRecord(raw.trip, "旧版备注", raw.updatedAt || new Date(0).toISOString());
      Object.entries(raw.days || {}).forEach(([key, value]) => {
        migrated.days[key] = noteRecord(value, "旧版备注", raw.updatedAt || new Date(0).toISOString());
      });
      Object.entries(raw.stops || {}).forEach(([key, value]) => {
        migrated.stops[key] = noteRecord(value, "旧版备注", raw.updatedAt || new Date(0).toISOString());
      });
      return migrated;
    }

function newerRecord(localValue, incomingValue) {
      if (!incomingValue) return localValue || null;
      if (!localValue) return incomingValue;
      const localTime = Date.parse(localValue.updatedAt || 0) || 0;
      const incomingTime = Date.parse(incomingValue.updatedAt || 0) || 0;
      return incomingTime > localTime ? incomingValue : localValue;
    }

function mergeTripNotes(localRaw, incomingRaw) {
      const local = normalizeTripNotes(localRaw);
      const incoming = normalizeTripNotes(incomingRaw);
      const merged = emptyTripNotes(local.actor || incoming.actor || "");
      merged.trip = newerRecord(local.trip, incoming.trip);
      for (const key of new Set([...Object.keys(local.days), ...Object.keys(incoming.days)])) {
        merged.days[key] = newerRecord(local.days[key], incoming.days[key]);
      }
      for (const key of new Set([...Object.keys(local.stops), ...Object.keys(incoming.stops)])) {
        merged.stops[key] = newerRecord(local.stops[key], incoming.stops[key]);
      }
      merged.updatedAt = [local.updatedAt, incoming.updatedAt].sort().at(-1);
      return merged;
    }

function flattenStops(trip) {
      const stops = [];
      let ordinal = 1;
      trip.days.forEach(day => {
        day.stops.forEach(stop => {
          stops.push({
            ...stop,
            day: day.day,
            date: day.date,
            day_summary: day.summary || "",
            ordinal
          });
          ordinal += 1;
        });
      });
      return stops;
    }

function stopKey(stop) {
      return stop.id || `${stop.day}-${stop.name}-${stop.city}`;
    }

function haversineKm(a, b) {
      const radius = 6371;
      const toRad = value => value * Math.PI / 180;
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const dlat = lat2 - lat1;
      const dlon = toRad(b.lon - a.lon);
      const h = Math.sin(dlat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dlon / 2) ** 2;
      return 2 * radius * Math.asin(Math.sqrt(h));
    }

function totalKm(items) {
      return Math.round(items.slice(1).reduce((sum, stop, index) => sum + haversineKm(items[index], stop), 0));
    }

function niceScale(maxKm) {
      if (maxKm <= 5) return 1;
      let scale = 1;
      [2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000].forEach(candidate => {
        if (candidate <= maxKm) scale = candidate;
      });
      return scale;
    }

function cityHubStops(stops) {
      const groups = new Map();
      stops.forEach(stop => {
        const key = `${stop.city}|${stop.country}`;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(stop);
      });
      return [...groups.values()].map((group, index) => {
        const first = group[0];
        const last = group[group.length - 1];
        return {
          ...first,
          id: `city-hub-${index + 1}`,
          name: first.city,
          lat: group.reduce((sum, stop) => sum + stop.lat, 0) / group.length,
          lon: group.reduce((sum, stop) => sum + stop.lon, 0) / group.length,
          day: first.day,
          dayEnd: last.day,
          displayOrdinal: index + 1,
          sourceOrdinal: first.ordinal,
          stopCount: group.length,
          isCityHub: true
        };
      });
    }

function dayViewStops(stops, dayNumber) {
      return stops
        .filter(stop => stop.day === Number(dayNumber))
        .map((stop, index) => ({
          ...stop,
          displayOrdinal: index + 1,
          sourceOrdinal: stop.ordinal,
          isCityHub: false
        }));
    }

function projectStops(items, width = MAP_W, height = MAP_H, padding = 86, options = {}) {
      if (!items.length) return { points: {}, scaleKm: 0, scalePx: 0 };
      const mode = options.mode || "overview";
      const meanLat = items.reduce((sum, stop) => sum + stop.lat, 0) / items.length;
      const cosLat = Math.max(Math.cos(meanLat * Math.PI / 180), 0.18);
      const raw = items.map(stop => ({ stop, x: stop.lon * cosLat, y: stop.lat }));
      const rawXs = raw.map(item => item.x);
      const rawYs = raw.map(item => item.y);
      const rawXSpan = Math.max(...rawXs) - Math.min(...rawXs);
      const rawYSpan = Math.max(...rawYs) - Math.min(...rawYs);
      const sameCity = new Set(items.map(stop => `${stop.city}|${stop.country}`)).size === 1;
      const points = {};

      if (mode === "day" && (sameCity || Math.max(rawXSpan, rawYSpan) < 0.06)) {
        const left = padding + 72;
        const right = width - padding - 72;
        const centerY = height / 2 + 16;
        items.forEach((stop, index) => {
          let px = width / 2;
          let py = centerY;
          if (items.length > 1) {
            const columns = Math.min(items.length, 4);
            const column = index % columns;
            const row = Math.floor(index / columns);
            const usable = right - left;
            px = left + (columns === 1 ? usable / 2 : column * usable / (columns - 1));
            if (row % 2 === 1) px = right - (px - left);
            py = centerY + (row - (Math.ceil(items.length / columns) - 1) / 2) * 150 + (column % 2 ? 18 : -18);
          }
          points[stopKey(stop)] = [Math.round(px), Math.round(py)];
        });
        return { points, scaleKm: niceScale(Math.max(totalKm(items), 1)), scalePx: 132 };
      }

      const centerX = (Math.min(...rawXs) + Math.max(...rawXs)) / 2;
      const centerY = (Math.min(...rawYs) + Math.max(...rawYs)) / 2;
      const warp = value => {
        if (mode !== "overview") return value;
        const sign = value < 0 ? -1 : 1;
        return sign * Math.pow(Math.abs(value), 0.72);
      };
      const values = raw.map(item => ({
        stop: item.stop,
        x: warp((item.x - centerX) / Math.max(rawXSpan, 0.08)),
        y: warp((item.y - centerY) / Math.max(rawYSpan, 0.08))
      }));
      const xs = values.map(item => item.x);
      const ys = values.map(item => item.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const xSpan = Math.max(maxX - minX, 0.08);
      const ySpan = Math.max(maxY - minY, 0.08);
      const drawW = width - padding * 2;
      const drawH = height - padding * 2;
      const fit = Math.min(drawW / xSpan, drawH / ySpan);
      const usedW = xSpan * fit;
      const left = (width - usedW) / 2;
      const top = (height - ySpan * fit) / 2;
      const minDistance = mode === "overview" ? 112 : 96;
      const placed = [];
      const offsets = [[0, 0]];
      [40, 72, 104, 136].forEach(radius => {
        for (let angle = 0; angle < 360; angle += 45) {
          const rad = angle * Math.PI / 180;
          offsets.push([Math.cos(rad) * radius, Math.sin(rad) * radius]);
        }
      });
      values.forEach(({ stop, x, y }) => {
        const originX = left + (x - minX) * fit;
        const originY = top + (maxY - y) * fit;
        let best = null;
        offsets.forEach(([dx, dy]) => {
          const px = Math.min(Math.max(originX + dx, padding), width - padding);
          const py = Math.min(Math.max(originY + dy, padding), height - padding);
          const nearest = placed.length
            ? Math.min(...placed.map(point => Math.hypot(px - point[0], py - point[1])))
            : minDistance;
          const collision = Math.max(0, minDistance - nearest);
          const score = collision * collision * 80 + Math.hypot(dx, dy);
          if (!best || score < best.score) best = { x: px, y: py, score };
        });
        const point = [Math.round(best.x / 4) * 4, Math.round(best.y / 4) * 4];
        placed.push(point);
        points[stopKey(stop)] = point;
      });
      const kmPerPx = Math.max(rawXSpan, rawYSpan) * 111.32 / Math.max(Math.max(usedW, ySpan * fit), 1);
      const scaleKm = niceScale(kmPerPx * Math.min(180, drawW * 0.18));
      const scalePx = Math.min(Math.max(56, Math.round(scaleKm / Math.max(kmPerPx, 0.001))), width - 160);
      return { points, scaleKm, scalePx };
    }

function boxesOverlap(a, b, gap = 8) {
      return a.x < b.x + b.width + gap && a.x + a.width + gap > b.x &&
        a.y < b.y + b.height + gap && a.y + a.height + gap > b.y;
    }

function layoutMapLabels(items, points, width, height, mode = "overview") {
      const result = {};
      const placed = [];
      items.forEach(stop => {
        const point = points[stopKey(stop)];
        if (!point) return;
        const name = trimText(stop.name, mode === "overview" ? 9 : 14);
        const meta = stop.isCityHub
          ? `${stop.stopCount} 个地点 · Day ${stop.day}${stop.dayEnd !== stop.day ? `-${stop.dayEnd}` : ""}`
          : `${stop.arrival_time || `第 ${stop.displayOrdinal} 站`} · ${stop.city}`;
        const charWidth = mode === "overview" ? 14 : 13;
        const boxWidth = Math.min(mode === "overview" ? 190 : 220, Math.max(112, Math.max(name.length, meta.length) * charWidth + 24));
        const boxHeight = 52;
        const candidates = [
          [28, -40], [-boxWidth - 28, -40], [28, 12], [-boxWidth - 28, 12],
          [-boxWidth / 2, -78], [-boxWidth / 2, 30],
          [48, -68], [-boxWidth - 48, -68], [48, 30], [-boxWidth - 48, 30]
        ];
        let best = null;
        candidates.forEach(([dx, dy], candidateIndex) => {
          const box = {
            x: Math.min(Math.max(point[0] + dx, 18), width - boxWidth - 18),
            y: Math.min(Math.max(point[1] + dy, 72), height - boxHeight - 38),
            width: boxWidth,
            height: boxHeight
          };
          const labelCollisions = placed.filter(other => boxesOverlap(box, other)).length;
          const markerCollisions = items.filter(other => {
            const marker = points[stopKey(other)];
            return marker && marker !== point &&
              marker[0] > box.x - 12 && marker[0] < box.x + box.width + 12 &&
              marker[1] > box.y - 12 && marker[1] < box.y + box.height + 12;
          }).length;
          const score = labelCollisions * 100000 + markerCollisions * 20000 + candidateIndex * 30 + Math.hypot(dx, dy);
          if (!best || score < best.score) best = { ...box, score };
        });
        const leaderX = Math.min(Math.max(point[0], best.x), best.x + best.width);
        const leaderY = Math.min(Math.max(point[1], best.y), best.y + best.height);
        result[stopKey(stop)] = { ...best, leaderX, leaderY, name, meta };
        placed.push(best);
      });
      return result;
    }

function layoutRouteDistances(items, points, labels, width, height, mode = "overview") {
      const labelBoxes = Object.values(labels);
      const placed = [];
      return items.slice(1).map((stop, index) => {
        const start = items[index];
        if (mode === "day" && start.city === stop.city) return null;
        const p1 = points[stopKey(start)];
        const p2 = points[stopKey(stop)];
        const midX = (p1[0] + p2[0]) / 2;
        const midY = (p1[1] + p2[1]) / 2;
        const candidates = [
          [0, -14], [0, 30], [-42, -14], [42, -14],
          [-42, 30], [42, 30], [0, -38], [0, 52]
        ];
        let best = null;
        candidates.forEach(([dx, dy], candidateIndex) => {
          const box = {
            x: Math.min(Math.max(midX + dx - 38, 36), width - 112),
            y: Math.min(Math.max(midY + dy - 15, 70), height - 70),
            width: 76,
            height: 20
          };
          const labelHits = labelBoxes.filter(label => boxesOverlap(box, label, 4)).length;
          const distanceHits = placed.filter(other => boxesOverlap(box, other, 4)).length;
          const score = labelHits * 100000 + distanceHits * 50000 + candidateIndex * 20 + Math.hypot(dx, dy);
          if (!best || score < best.score) best = { ...box, score };
        });
        placed.push(best);
        return {
          x: best.x + best.width / 2,
          y: best.y + 15,
          km: Math.max(1, Math.round(haversineKm(start, stop)))
        };
      });
    }

function buildMapViews(stops) {
      const hubs = cityHubStops(stops);
      const views = [{
        key: "overview",
        label: "全程行旅舆图",
        mode: "overview",
        stops: hubs,
        contextStops: hubs,
        ...projectStops(hubs, MAP_W, MAP_H, 92, { mode: "overview" })
      }];
      [...new Set(stops.map(stop => stop.day))].sort((a, b) => a - b).forEach(dayNumber => {
        const dayStops = dayViewStops(stops, dayNumber);
        const first = dayStops[0];
        views.push({
          key: `day-${dayNumber}`,
          label: `Day ${dayNumber} · ${first ? first.date : "每日行程"}`,
          mode: "day",
          stops: dayStops,
          contextStops: dayStops,
          ...projectStops(dayStops, MAP_W, MAP_H, 94, { mode: "day" })
        });
      });
      return views;
    }

function renderAtlasDecorations(width, height) {
      return `
        <path class="atlas-river" d="M -30 ${height * 0.78} C ${width * 0.18} ${height * 0.62}, ${width * 0.32} ${height * 0.94}, ${width * 0.5} ${height * 0.77} S ${width * 0.82} ${height * 0.58}, ${width + 30} ${height * 0.72}"/>
        <path class="atlas-river-highlight" d="M -30 ${height * 0.78} C ${width * 0.18} ${height * 0.62}, ${width * 0.32} ${height * 0.94}, ${width * 0.5} ${height * 0.77} S ${width * 0.82} ${height * 0.58}, ${width + 30} ${height * 0.72}"/>
        <g transform="translate(74 108)" opacity=".42">
          <path class="mountain-back" d="M0 80 L48 8 L92 80 Z M62 80 L116 24 L168 80 Z"/>
          <path class="mountain-front" d="M20 80 L68 34 L112 80 Z"/>
        </g>
        <g transform="translate(${width - 220} ${height - 184})" opacity=".34">
          <path class="mountain-back" d="M0 96 L62 8 L122 96 Z M82 96 L142 30 L198 96 Z"/>
          <path class="mountain-front" d="M34 96 L96 42 L150 96 Z"/>
        </g>
        <path class="cloud-line" d="M${width - 254} 104 C${width - 226} 78 ${width - 190} 82 ${width - 174} 110 C${width - 142} 84 ${width - 104} 94 ${width - 96} 124"/>
        <path class="cloud-line" d="M86 ${height - 96} C114 ${height - 122} 150 ${height - 116} 164 ${height - 88} C196 ${height - 112} 232 ${height - 104} 242 ${height - 76}"/>
      `;
    }

function renderMapSvg(trip, interactive = false) {
      const stops = flattenStops(trip);
      const views = buildMapViews(stops);
      return `
        <svg id="pixel-map" class="pixel-map" viewBox="0 0 ${MAP_W} ${MAP_H}" role="img" aria-label="旅行路线古风舆图">
          <defs>
            <pattern id="atlas-paper-pattern" width="56" height="56" patternUnits="userSpaceOnUse">
              <path d="M0 12 C14 8 30 16 56 10 M8 44 C24 38 38 48 54 42" class="atlas-paper-line"/>
            </pattern>
            <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
            </marker>
          </defs>
          ${views.map(view => renderMapView(view, stops, interactive)).join("")}
        </svg>
      `;
    }

function renderMapView(view, allStops, interactive) {
      const viewStops = view.contextStops.filter(stop => view.points[stopKey(stop)]);
      const labels = layoutMapLabels(viewStops, view.points, MAP_W, MAP_H, view.mode);
      const distancePositions = layoutRouteDistances(viewStops, view.points, labels, MAP_W, MAP_H, view.mode);
      const routePoints = viewStops.map(stop => view.points[stopKey(stop)].join(",")).join(" ");
      const segments = viewStops.slice(1).map((stop, index) => {
        const position = distancePositions[index];
        if (!position) return "";
        return `<text class="distance-label" x="${position.x}" y="${position.y}" text-anchor="middle">约 ${position.km} km</text>`;
      }).join("");
      const markers = viewStops.map(stop => {
        const point = view.points[stopKey(stop)];
        const label = labels[stopKey(stop)];
        const sourceIndex = Math.max(0, (stop.sourceOrdinal || stop.ordinal) - 1);
        const data = interactive ? ` data-stop-index="${sourceIndex}" tabindex="0" role="button"` : "";
        const hub = stop.isCityHub ? " marker-hub" : "";
        return `
          <g class="marker marker-${esc(stop.category)}${hub}"${data} aria-label="${esc(stop.name)}">
            <line class="label-leader" x1="${point[0]}" y1="${point[1]}" x2="${label.leaderX}" y2="${label.leaderY}"/>
            <rect class="poi-label-bg" x="${label.x}" y="${label.y}" width="${label.width}" height="${label.height}" rx="4"/>
            <text class="poi-label" x="${label.x + 12}" y="${label.y + 21}">${esc(label.name)}</text>
            <text class="poi-day" x="${label.x + 12}" y="${label.y + 41}">${esc(label.meta)}</text>
            <circle class="marker-halo" cx="${point[0]}" cy="${point[1]}" r="${stop.isCityHub ? 24 : 21}"/>
            <circle class="marker-box" cx="${point[0]}" cy="${point[1]}" r="${stop.isCityHub ? 17 : 15}"/>
            <text class="marker-num" x="${point[0]}" y="${point[1] + 5}" text-anchor="middle">${stop.displayOrdinal || stop.ordinal}</text>
          </g>
        `;
      }).join("");
      return `
        <g class="map-view" data-view="${esc(view.key)}" style="${view.key === "overview" ? "" : "display:none"}">
          <rect width="${MAP_W}" height="${MAP_H}" class="atlas-water"/>
          <rect width="${MAP_W}" height="${MAP_H}" fill="url(#atlas-paper-pattern)"/>
          ${renderAtlasDecorations(MAP_W, MAP_H)}
          <rect x="28" y="28" width="${MAP_W - 56}" height="${MAP_H - 56}" class="atlas-frame-inner"/>
          <text x="48" y="58" class="map-title">${esc(view.label)}</text>
          <text x="${MAP_W - 48}" y="58" class="north" text-anchor="end">北 ↑</text>
          <polyline class="route-shadow" points="${routePoints}"/>
          <polyline class="route" points="${routePoints}" marker-mid="url(#route-arrow)" marker-end="url(#route-arrow)"/>
          ${segments}
          <g class="marker-layer" data-view="${esc(view.key)}">${markers}</g>
          ${renderMapLegend(view)}
        </g>
      `;
    }

function renderMapLegend(view) {
      return `
        <g class="map-legend" transform="translate(48 ${MAP_H - 76})">
          <rect width="242" height="44" rx="4"/>
          <line class="legend-route" x1="14" y1="16" x2="52" y2="16"/>
          <text x="62" y="20">行程顺序</text>
          <text x="14" y="37">${view.mode === "overview" ? "城市方位经视觉优化" : "当天地点独立放大"} · 距离为直线近似</text>
        </g>
      `;
    }

function renderStatsHtml(trip) {
      const stops = flattenStops(trip);
      const cities = new Set(stops.map(stop => stop.city));
      const items = [
        ["天数", String(trip.days.length)],
        ["城市", String(cities.size)],
        ["地点", String(stops.length)],
        ["直线路线", `${totalKm(stops)} km`]
      ];
      return items.map(([label, value]) => `<div class="stat-item"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`).join("");
    }

function renderItineraryHtml(trip) {
      let index = 0;
      return trip.days.map(day => {
        const briefingMeta = [
          day.meeting_time ? `集合 ${day.meeting_time}` : "",
          day.meeting_point || "",
          day.cautions || ""
        ].filter(Boolean).join(" · ");
        const stopsHtml = day.stops.map(stop => {
          const currentIndex = index;
          index += 1;
          const stopMeta = [
            stop.arrival_time || "",
            `${stop.duration_min} min`,
            stop.reservation_required ? `预约 ${stop.reservation_time || "已确认"}` : "",
            stop.transit_buffer_min ? `缓冲 ${stop.transit_buffer_min} min` : ""
          ].filter(Boolean).join(" · ");
          return `
            <button class="schedule-item" type="button" data-stop-index="${currentIndex}" data-city="${esc(stop.city)}" data-day="${day.day}">
              <span class="schedule-index">${currentIndex + 1}</span>
              <span>
                <strong>${esc(stop.name)}</strong>
                <small>${esc(stop.city)} · ${esc(stopMeta)}</small>
              </span>
            </button>
          `;
        }).join("");
        return `
          <div class="day-block">
            <h3>Day ${day.day} <span>${esc(day.date)}</span></h3>
            <p class="day-summary">${esc(day.summary || "每日行程")}</p>
            ${briefingMeta ? `<p class="day-brief-meta">${esc(briefingMeta)}</p>` : ""}
            ${stopsHtml}
          </div>
        `;
      }).join("");
    }

function renderPoiCardHtml(stop) {
      const mapUrl = stop.navigation_url || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stop.lat + "," + stop.lon)}`;
      const link = (url, label) => url ? `<a href="${esc(url)}" target="_blank" rel="noreferrer">${esc(label)}</a>` : "";
      const reservation = stop.reservation_required
        ? `需要预约${stop.reservation_time ? ` · ${esc(stop.reservation_time)}` : ""}${stop.reservation_reference ? ` · ${esc(stop.reservation_reference)}` : ""}`
        : "无需预约";
      const sourceLabel = stop.source === "curated_demo_itinerary" ? "公开示例行程" : stop.source;
      return `
        <p class="poi-meta">Day ${esc(stop.day)} · ${esc(stop.city)} · ${esc(stop.category)} · ${esc(stop.arrival_time || "时间待定")} · ${esc(stop.duration_min)} min</p>
        <h3>${esc(stop.name)}</h3>
        <p>${esc(stop.description || "暂无补充描述。")}</p>
        <p><strong>预约：</strong>${reservation}</p>
        <p><strong>交通缓冲：</strong>${esc(stop.transit_buffer_min ?? 20)} min</p>

        <p><strong>备注：</strong>${esc(stop.notes)}</p>
        <div class="poi-actions">

        <div class="source-note">来源：${esc(sourceLabel)}。地图方位与距离由地点坐标估算；营业时间、票价和预约信息请以官网为准。</div>
      `;
    }

function posterCss() {
      return `
        .bg{fill:#e9e1c8}.frame{fill:#fffaf0;stroke:#4d523e;stroke-width:4}
        .kicker{fill:#9f3b32;font:700 22px "Microsoft YaHei",sans-serif}.title{fill:#243f35;font:700 42px "STKaiti","KaiTi","Microsoft YaHei",serif}
        .meta,.small{fill:#6e6653;font:700 18px "Microsoft YaHei",sans-serif}.section{fill:#243f35;font:700 28px "STKaiti","KaiTi","Microsoft YaHei",serif}

function posterDefs() {
      return `
        <defs>
          <pattern id="poster-paper-pattern" width="56" height="56" patternUnits="userSpaceOnUse">
            <path d="M0 12 C14 8 30 16 56 10 M8 44 C24 38 38 48 54 42" class="atlas-paper-line"/>
          </pattern>
          <marker id="poster-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10z" class="arrow"/>
          </marker>
        </defs>
      `;
    }

function routeMapSvg(items, x, y, width, height, title, mode = "overview") {
      const mapStops = mode === "overview"
        ? cityHubStops(items)
        : items.map((stop, index) => ({ ...stop, displayOrdinal: index + 1, sourceOrdinal: stop.ordinal, isCityHub: false }));
      const projection = projectStops(mapStops, width, height, 90, { mode });
      const labels = layoutMapLabels(mapStops, projection.points, width, height, mode);
      const distancePositions = layoutRouteDistances(mapStops, projection.points, labels, width, height, mode);
      const routePoints = mapStops.map(stop => projection.points[stopKey(stop)].join(",")).join(" ");
      const segments = mapStops.slice(1).map((stop, index) => {
        const position = distancePositions[index];
        if (!position) return "";
        return `<text class="distance" x="${position.x}" y="${position.y}" text-anchor="middle">约 ${position.km} km</text>`;
      }).join("");
      const markersSvg = mapStops.map(stop => {
        const point = projection.points[stopKey(stop)];
        const label = labels[stopKey(stop)];
        return `
          <g>
            <line class="leader" x1="${point[0]}" y1="${point[1]}" x2="${label.leaderX}" y2="${label.leaderY}"/>
            <rect class="label-bg" x="${label.x}" y="${label.y}" width="${label.width}" height="${label.height}" rx="4"/>
            <text class="label" x="${label.x + 12}" y="${label.y + 21}">${esc(label.name)}</text>
            <text class="muted-label" x="${label.x + 12}" y="${label.y + 41}">${esc(label.meta)}</text>
            <circle class="${stop.isCityHub ? "marker-hub" : "marker-box"}" cx="${point[0]}" cy="${point[1]}" r="${stop.isCityHub ? 17 : 15}"/>
            <text class="marker-num" x="${point[0]}" y="${point[1] + 5}" text-anchor="middle">${stop.displayOrdinal || stop.ordinal}</text>
          </g>`;
      }).join("");
      return `
        <g transform="translate(${x},${y})">
          <rect width="${width}" height="${height}" class="map-bg"/>
          <rect width="${width}" height="${height}" fill="url(#poster-paper-pattern)"/>
          ${renderAtlasDecorations(width, height)}
          <rect x="28" y="28" width="${width - 56}" height="${height - 56}" class="map-frame"/>
          <text x="48" y="56" class="row-title">${esc(title)}</text>
          <text x="${width - 48}" y="56" class="row-title" text-anchor="end">北 ↑</text>
          <polyline class="route-shadow" points="${routePoints}"/>
          <polyline class="route" points="${routePoints}" marker-mid="url(#poster-arrow)" marker-end="url(#poster-arrow)"/>
          ${segments}${markersSvg}
          <g transform="translate(48 ${height - 52})">
            <line class="map-note-line" x1="0" y1="0" x2="38" y2="0"/>
            <text class="map-note" x="50" y="4">${mode === "overview" ? "城市方位经视觉优化" : "当天地点独立放大"} · 距离为直线近似</text>
          </g>
        </g>`;
    }

function posterShell(title, subtitle, body) {
      return `<svg id="pixel-travel-dynamic-poster" xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="${esc(title)}">
        ${posterDefs()}
        <style>${posterCss()}</style>
        <rect width="1600" height="1130" class="bg"/>
        <rect x="64" y="56" width="1472" height="1018" class="frame"/>
        <text x="120" y="112" class="kicker">PixelTravelMap · 行旅纪念舆图</text>
        <text x="120" y="154" class="title">${esc(trimText(title, 34))}</text>
        <text x="120" y="194" class="meta">${esc(subtitle)}</text>
        ${body}
      </svg>`;
    }

function itineraryRows(items, x, y, width, rowHeight, limit) {
      return items.slice(0, limit).map((item, index) => {
        const rowY = y + index * rowHeight;
        return `<g transform="translate(${x},${rowY})">
          <rect width="${width}" height="${rowHeight - 8}" rx="4" class="row"/>
          <text x="20" y="25" class="row-title">${esc(item.title)}</text>
          <text x="20" y="${rowHeight - 18}" class="row-text">${esc(trimText(item.body, 105))}</text>
        </g>`;
      }).join("");
    }

function noteBox(label, note, x, y, width, height) {
      const content = text(note) || "暂无补充备注。";
      return `<g transform="translate(${x},${y})">
        <rect width="${width}" height="${height}" rx="4" class="note"/>
        <text x="20" y="28" class="row-title">${esc(label)}</text>
        <text x="20" y="58" class="note-text">${esc(trimText(content, 96))}</text>
      </g>`;
    }

function renderOverviewPosterSvgForTrip(trip) {
      const stops = flattenStops(trip);
      const rows = trip.days.map(day => ({
        title: `Day ${day.day} · ${day.date}`,
        body: `${day.summary || "行程"}：${day.stops.map(stop => `${stop.name}(${stop.city}, ${stop.duration_min}m)`).join(" · ")}`
      }));
      const subtitle = `${trip.start_date} - ${trip.end_date} · ${trip.days.length} 天 · ${new Set(stops.map(stop => stop.city)).size} 座城市 · ${stops.length} 个地点 · 约 ${totalKm(stops)} km 直线距离`;
      const body = `
        ${routeMapSvg(stops, 120, 220, 1360, 500, "总行程路线", "overview")}
        <text x="120" y="760" class="section">完整行程</text>
        ${itineraryRows(rows, 120, 790, 1360, Math.min(58, Math.max(42, Math.floor(300 / trip.days.length))), trip.days.length)}
      `;
      return posterShell(`${trip.trip_title} · 总行程介绍`, subtitle, body);
    }

function renderDayPosterSvgForTrip(trip, dayNumber, notes = {}) {
      const stops = flattenStops(trip);
      const day = trip.days.find(item => item.day === Number(dayNumber)) || trip.days[0];
      const dayStops = stops.filter(stop => stop.day === day.day);
      const rows = dayStops.map(stop => ({
        title: `${stop.arrival_time || stop.ordinal + "."} ${stop.name} · ${stop.city}`,
        body: `${stop.reservation_required ? `预约 ${stop.reservation_time || "已确认"} · ` : ""}停留 ${stop.duration_min} min · 缓冲 ${stop.transit_buffer_min ?? 20} min · ${stop.cautions || stop.notes || "按现场情况调整"}`
      }));
      const note = noteValue(notes.days && notes.days[day.day]) || day.cautions || day.summary || "";
      const body = `
        ${routeMapSvg(dayStops, 120, 220, 1360, 420, `Day ${day.day} 明日路线`, "day")}
        <text x="120" y="690" class="section">明日具体行程</text>
        ${itineraryRows(rows, 120, 720, 1360, 58, 6)}
        ${noteBox(`集合 ${day.meeting_time || "待确认"} · ${day.meeting_point || "集合地点待确认"}`, note, 120, 1010, 1360, 70)}
      `;
      return posterShell(`${trip.trip_title} · Day ${day.day} 简报`, `${day.date} · ${day.summary || "每日行程"} · ${dayStops.length} 个地点 · 约 ${totalKm(dayStops)} km 直线距离`, body);
    }

function renderRecordPosterSvgForTrip(trip, notes = {}) {
      const stops = flattenStops(trip);
      const rows = trip.days.map(day => {
        const dayStops = stops.filter(stop => stop.day === day.day);
        const dayRemark = noteValue(notes.days && notes.days[day.day]) || day.summary || "暂无当天记录";
        const stopRemark = dayStops.map(stop => noteValue(notes.stops && notes.stops[stopKey(stop)])).filter(Boolean).join("；");
        return {
          title: `Day ${day.day} · ${day.date}`,
          body: stopRemark ? `${dayRemark}｜${stopRemark}` : dayRemark
        };
      });
      const body = `
        ${routeMapSvg(stops, 120, 220, 1360, 450, "旅行记录路线", "overview")}
        ${noteBox("全程总结", noteValue(notes.trip), 120, 700, 1360, 86)}
        <text x="120" y="830" class="section">每日记录</text>
        ${itineraryRows(rows, 120, 860, 1360, Math.min(54, Math.max(40, Math.floor(205 / trip.days.length))), trip.days.length)}
      `;
      return posterShell(`${trip.trip_title} · 旅行记录`, `${trip.start_date} - ${trip.end_date} · 记录来自当前浏览器备注`, body);
    }

function downloadText(filename, content, type) {
      const blob = new Blob([content], { type });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      URL.revokeObjectURL(a.href);
      a.remove();
    }

function downloadSvg(filename, svgText) {
      downloadText(filename, svgText, "image/svg+xml;charset=utf-8");
    }

function initViewer() {
      const embeddedTrip = JSON.parse(document.getElementById("trip-data").textContent);
      const sharedPayload = readSharePayload();
      const trip = sharedPayload && sharedPayload.trip ? expandSharedTrip(sharedPayload.trip) : embeddedTrip;
      document.getElementById("trip-data").textContent = JSON.stringify(trip);
      document.title = `${trip.trip_title} | PixelTravelMap`;
      document.querySelector("h1").textContent = trip.trip_title;

      const stops = flattenStops(trip);
      const storageKey = `PixelTravelMap:${trip.trip_title}:${trip.start_date}:${trip.end_date}`;
      const cityPills = document.getElementById("city-pills");
      const daySelect = document.getElementById("poster-day-select");
      const briefingDaySelect = document.getElementById("briefing-day-select");
      const tripNote = document.getElementById("trip-note");
      const dayNote = document.getElementById("day-note");
      const stopNote = document.getElementById("stop-note");
      const collaboratorName = document.getElementById("collaborator-name");
      const collaborationStatus = document.getElementById("collaboration-status");
      const card = document.getElementById("poi-card");
      const viewLabel = document.getElementById("view-label");
      let currentStopIndex = 0;
      let tripNotes = mergeTripNotes(loadTripNotes(), sharedPayload && sharedPayload.notes);

      cityPills.innerHTML = `<button class="city-pill active" type="button" data-view="overview">总览</button>` +
        trip.days
          .map(day => `<button class="city-pill" type="button" data-view="day-${day.day}">Day ${day.day}</button>`)
          .join("");
      document.getElementById("map-container").innerHTML = renderMapSvg(trip, true);
      document.getElementById("stats-bar").innerHTML = renderStatsHtml(trip);
      document.getElementById("itinerary-list").innerHTML = renderItineraryHtml(trip);
      const dayOptions = trip.days.map(day => `<option value="${day.day}">Day ${day.day} · ${esc(day.date)}</option>`).join("");
      daySelect.innerHTML = dayOptions;
      briefingDaySelect.innerHTML = dayOptions;

      function markers() {
        return Array.from(document.querySelectorAll(".marker[data-stop-index]"));
      }

      function scheduleItems() {
        return Array.from(document.querySelectorAll(".schedule-item"));
      }

      function cityButtons() {
        return Array.from(document.querySelectorAll(".city-pill"));
      }

      function loadTripNotes() {
        try {
          return normalizeTripNotes(JSON.parse(localStorage.getItem(storageKey) || "{}"));
        } catch {
          return emptyTripNotes();
        }
      }

      function saveTripNotes() {
        tripNotes.actor = collaboratorName.value.trim();
        tripNotes.updatedAt = new Date().toISOString();
        localStorage.setItem(storageKey, JSON.stringify(tripNotes));
      }

      function selectedDayNumber() {
        return Number(daySelect.value || trip.days[0].day);
      }

      function syncNoteFields() {
        collaboratorName.value = tripNotes.actor || "";
        tripNote.value = noteValue(tripNotes.trip);
        dayNote.value = noteValue(tripNotes.days[selectedDayNumber()]);
        const stop = stops[currentStopIndex];
        stopNote.value = stop ? noteValue(tripNotes.stops[stopKey(stop)]) : "";
      }

      function showCard(index) {
        const stop = stops[index];
        if (!stop) return;
        currentStopIndex = index;
        daySelect.value = String(stop.day);
        briefingDaySelect.value = String(stop.day);
        markers().forEach(marker => marker.classList.toggle("active", Number(marker.dataset.stopIndex) === index));
        scheduleItems().forEach(item => item.classList.toggle("active", Number(item.dataset.stopIndex) === index));
        card.innerHTML = renderPoiCardHtml(stop);
        syncNoteFields();
      }

      function bindMarkers() {
        markers().forEach(marker => {
          if (marker.dataset.bound === "true") return;
          marker.dataset.bound = "true";
          marker.addEventListener("click", () => showCard(Number(marker.dataset.stopIndex)));
          marker.addEventListener("keydown", event => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              showCard(Number(marker.dataset.stopIndex));
            }
          });
        });
      }

      function showView(view) {
        const isOverview = view === "overview";
        const dayNumber = isOverview ? null : Number(view.replace("day-", ""));
        const selectedDay = trip.days.find(day => day.day === dayNumber);
        document.querySelectorAll(".map-view").forEach(group => {
          group.style.display = group.dataset.view === view ? "block" : "none";
        });
        viewLabel.textContent = isOverview
          ? "全程行旅舆图"
          : `Day ${dayNumber}${selectedDay && selectedDay.summary ? ` · ${selectedDay.summary}` : ""}`;
        cityButtons().forEach(button => button.classList.toggle("active", button.dataset.view === view));
        scheduleItems().forEach(item => {
          item.classList.toggle("focus-city", !isOverview);
          item.classList.toggle("in-city", !isOverview && Number(item.dataset.day) === dayNumber);
        });
        if (!isOverview) {
          const first = scheduleItems().find(item => Number(item.dataset.day) === dayNumber);
          if (first) showCard(Number(first.dataset.stopIndex));
        }
        bindMarkers();
      }

      function tripIdentity() {
        return `${trip.trip_title}|${trip.start_date}|${trip.end_date}`;
      }

      function setCollaborationStatus(message, kind = "") {
        collaborationStatus.textContent = message;
        collaborationStatus.className = "collaboration-status" + (kind ? ` ${kind}` : "");
      }

      async function copyText(value) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(value);
          return;
        }
        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        const copied = document.execCommand("copy");
        textarea.remove();
        if (!copied) throw new Error("当前浏览器无法自动复制，请手动复制地址栏链接。");
      }

      function buildShareLink(view = "map", dayNumber = selectedDayNumber()) {
        const payload = {
          v: 2,
          trip: compactTripForShare(trip),
          notes: tripNotes,
          view,
          day: Number(dayNumber),
          sharedAt: new Date().toISOString()
        };
        const url = new URL(SHARE_VIEWER_URL);
        url.hash = `ptm=${encodeBase64Url(JSON.stringify(payload))}`;
        return url.toString();
      }

      function downloadJson(filename, value) {
        downloadText(filename, JSON.stringify(value, null, 2), "application/json;charset=utf-8");
      }

      function exportCollaborationPackage() {
        saveTripNotes();
        downloadJson(`${fileSafe(trip.trip_title)}-collaboration-update.json`, {
          format: "PixelTravelMapCollaboration",
          version: 1,
          tripIdentity: tripIdentity(),
          actor: tripNotes.actor || "同行者",
          exportedAt: new Date().toISOString(),
          notes: tripNotes
        });
        setCollaborationStatus("协作更新包已导出，可发送给行程组织者合并。", "ok");
      }

      async function importCollaborationPackage(file) {
        const payload = JSON.parse(await file.text());
        if (payload.format !== "PixelTravelMapCollaboration" || !payload.notes) {
          throw new Error("这不是 PixelTravelMap 协作更新包。");
        }
        if (payload.tripIdentity !== tripIdentity()) {
          throw new Error("更新包属于另一份行程，已停止导入。");
        }
        const before = JSON.stringify(tripNotes);
        tripNotes = mergeTripNotes(tripNotes, payload.notes);
        saveTripNotes();
        syncNoteFields();
        renderBriefing(selectedDayNumber());
        setCollaborationStatus(
          before !== JSON.stringify(tripNotes)
            ? `已合并 ${payload.actor || "同行者"} 的更新。`
            : "没有比本地更新的备注需要合并。",
          "ok"
        );
      }

      function stopBriefingNote(stop) {
        return noteValue(tripNotes.stops[stopKey(stop)]) || stop.cautions || stop.notes || "";
      }

      function renderBriefing(dayNumber) {
        const day = trip.days.find(item => item.day === Number(dayNumber)) || trip.days[0];
        const dayStops = stops.filter(stop => stop.day === day.day);
        briefingDaySelect.value = String(day.day);
        const timeline = dayStops.map((stop, index) => {
          const reservation = stop.reservation_required
            ? `预约${stop.reservation_time ? ` ${esc(stop.reservation_time)}` : ""}`
            : "";
          return `
            <article class="briefing-stop">
              <div class="briefing-time">${esc(stop.arrival_time || `第 ${index + 1} 站`)}</div>
              <div class="briefing-rail"><span class="briefing-dot"></span></div>
              <div class="briefing-stop-card">
                <div class="briefing-stop-head">
                  <h4>${esc(stop.name)}</h4>
                  <span class="briefing-badge">${esc(stop.duration_min)} min</span>
                </div>
                <div class="briefing-badges">
                  <span class="briefing-badge">${esc(stop.city)}</span>
                  ${reservation ? `<span class="briefing-badge reservation">${reservation}</span>` : ""}
                  ${stop.transit_buffer_min ? `<span class="briefing-badge">交通缓冲 ${esc(stop.transit_buffer_min)} min</span>` : ""}
                </div>
                ${stop.reservation_reference ? `<p><strong>凭证：</strong>${esc(stop.reservation_reference)}</p>` : ""}
                ${stopBriefingNote(stop) ? `<p>${esc(stopBriefingNote(stop))}</p>` : ""}
              </div>
            </article>`;
        }).join("");
        document.getElementById("briefing-content").innerHTML = `
          <div class="briefing-hero">
            <span class="briefing-date">Day ${day.day} · ${esc(day.date)}</span>
            <h3>${esc(day.summary || "明日行程")}</h3>
            <p class="briefing-summary">${esc(noteValue(tripNotes.days[day.day]) || "请按集合时间到达，行程可根据现场情况调整。")}</p>
          </div>
          <div class="briefing-facts">
            <div class="briefing-fact"><span>集合时间</span><strong>${esc(day.meeting_time || "待确认")}</strong></div>
            <div class="briefing-fact"><span>集合地点</span><strong>${esc(day.meeting_point || "待确认")}</strong></div>
            <div class="briefing-fact"><span>地点数量</span><strong>${dayStops.length} 个</strong></div>
          </div>
          ${day.cautions ? `<p class="briefing-caution"><strong>注意事项：</strong>${esc(day.cautions)}</p>` : ""}
          <div class="briefing-timeline">${timeline}</div>
        `;
      }

      function showAppView(view, dayNumber = selectedDayNumber()) {
        const briefing = view === "briefing";
        document.getElementById("map-workspace").hidden = briefing;
        document.getElementById("briefing-view").hidden = !briefing;
        document.getElementById("map-view-button").classList.toggle("active", !briefing);
        document.getElementById("briefing-view-button").classList.toggle("active", briefing);
        if (briefing) renderBriefing(dayNumber);
      }

      scheduleItems().forEach(item => {
        item.addEventListener("click", () => {
          showView(`day-${item.dataset.day}`);
          showCard(Number(item.dataset.stopIndex));
        });
      });
      cityButtons().forEach(button => button.addEventListener("click", () => showView(button.dataset.view)));
      document.getElementById("overview-button").addEventListener("click", () => showView("overview"));
      document.getElementById("map-view-button").addEventListener("click", () => showAppView("map"));
      document.getElementById("briefing-view-button").addEventListener("click", () => showAppView("briefing"));
      document.getElementById("briefing-back").addEventListener("click", () => showAppView("map"));
      briefingDaySelect.addEventListener("change", () => renderBriefing(Number(briefingDaySelect.value)));
      document.getElementById("copy-trip-link").addEventListener("click", async () => {
        try {
          saveTripNotes();
          const link = buildShareLink("map");
          await copyText(link);
          setCollaborationStatus(`行程链接已复制${link.length > 12000 ? "，链接较长，部分聊天工具可能截断；可改发协作更新包。" : "。"}`, "ok");
        } catch (error) {
          setCollaborationStatus(error.message, "error");
        }
      });
      document.getElementById("copy-briefing-link").addEventListener("click", async () => {
        try {
          saveTripNotes();
          await copyText(buildShareLink("briefing", Number(briefingDaySelect.value)));
          setCollaborationStatus("明日简报链接已复制，可直接发给同行者。", "ok");
        } catch (error) {
          setCollaborationStatus(error.message, "error");
        }
      });
      document.getElementById("export-notes").addEventListener("click", exportCollaborationPackage);
      document.getElementById("import-notes").addEventListener("change", async event => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        try {
          await importCollaborationPackage(file);
        } catch (error) {
          setCollaborationStatus(error.message, "error");
        } finally {
          event.target.value = "";
        }
      });
      collaboratorName.addEventListener("change", saveTripNotes);
      document.getElementById("download-html").addEventListener("click", () => {
        downloadText(`${fileSafe(trip.trip_title)}.html`, "<!doctype html>\n" + document.documentElement.outerHTML, "text/html;charset=utf-8");
      });
      tripNote.addEventListener("input", () => {
        tripNotes.trip = noteRecord(tripNote.value, collaboratorName.value.trim());
        saveTripNotes();
      });
      dayNote.addEventListener("input", () => {
        tripNotes.days[selectedDayNumber()] = noteRecord(dayNote.value, collaboratorName.value.trim());
        saveTripNotes();
        renderBriefing(selectedDayNumber());
      });
      stopNote.addEventListener("input", () => {
        const stop = stops[currentStopIndex];
        if (!stop) return;
        tripNotes.stops[stopKey(stop)] = noteRecord(stopNote.value, collaboratorName.value.trim());
        saveTripNotes();
        renderBriefing(stop.day);
      });
      daySelect.addEventListener("change", () => {
        briefingDaySelect.value = daySelect.value;
        syncNoteFields();
      });
      document.getElementById("clear-notes").addEventListener("click", () => {
        if (!confirm("清空当前浏览器保存的旅行备注？")) return;
        tripNotes = emptyTripNotes(collaboratorName.value.trim());
        localStorage.removeItem(storageKey);
        syncNoteFields();
        renderBriefing(selectedDayNumber());
      });
      document.getElementById("download-overview-poster").addEventListener("click", () => {
        downloadSvg(`${fileSafe(trip.trip_title)}-overview-poster.svg`, renderOverviewPosterSvgForTrip(trip));
      });
      document.getElementById("download-day-poster").addEventListener("click", () => {
        downloadSvg(`${fileSafe(trip.trip_title)}-day-${selectedDayNumber()}-briefing.svg`, renderDayPosterSvgForTrip(trip, selectedDayNumber(), tripNotes));
      });
      document.getElementById("download-record-poster").addEventListener("click", () => {
        downloadSvg(`${fileSafe(trip.trip_title)}-travel-record-poster.svg`, renderRecordPosterSvgForTrip(trip, tripNotes));
      });

      localStorage.setItem(storageKey, JSON.stringify(tripNotes));
      bindMarkers();
      if (stops.length) showCard(0);
      syncNoteFields();
      renderBriefing(Number(sharedPayload && sharedPayload.day || trip.days[0].day));
      showAppView(sharedPayload && sharedPayload.view === "briefing" ? "briefing" : "map", sharedPayload && sharedPayload.day);
    }
initViewer();</script>
</body>
</html>
