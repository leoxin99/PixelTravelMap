  <title>PixelTravelMap 分享查看器 | PixelTravelMap</title>
  <style>

    :root {
      --paper: #edf3f1;
      --paper-2: #ffffff;
      --ink: #172522;
      --muted: #64736f;
      --water: #dceff1;
      --grid: rgba(23,37,34,0.09);
      --route: #e65c4f;
      --route-soft: #f8c5bf;
      --marker: #147d75;
      --marker-2: #f1b82d;
      --panel: #ffffff;
      --line: #c9d5d1;
      --line-strong: #8fa39d;
      --focus: #0f766e;
      --shadow: rgba(23, 37, 34, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    button, a, input, select, textarea { font: inherit; }
    [hidden] { display: none !important; }
    .app-shell { width: min(1480px, 100%); margin: 0 auto; padding: 18px; }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0 18px;
    }
    .eyebrow {
      margin: 0 0 4px;
      color: var(--focus);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 6px; font-size: clamp(24px, 4vw, 40px); line-height: 1.1; }
    h2 { margin-bottom: 12px; font-size: 18px; }
    h3 { margin-bottom: 6px; font-size: 15px; }
    h3 span { color: var(--muted); font-size: 12px; font-weight: 400; }
    .atlas-note { max-width: 760px; margin-bottom: 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .toolbar { display: flex; gap: 8px; align-items: center; }
    .view-button.active { border-color: var(--focus); background: var(--focus); color: #fff; }
    .icon-button, .text-button, .city-pill {
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
    }
    .icon-button { width: 42px; height: 38px; font-size: 20px; }
    .text-button { min-height: 38px; padding: 0 14px; font-weight: 700; }
    .text-button:hover, .city-pill:hover { border-color: var(--focus); color: var(--focus); background: #d9efeb; }
    .text-button.compact { width: 100%; min-height: 34px; padding: 0 10px; font-size: 12px; }
    .text-button.danger { background: #fff0f0; }
    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 18px;
      align-items: start;
    }
    .map-stage, .side-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper-2);
      box-shadow: 0 16px 40px var(--shadow);
    }
    .map-stage { min-width: 0; overflow: hidden; }
    .map-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #f5f8f7;
      font-weight: 700;
    }
    .city-pills { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .city-pill {
      min-height: 30px;
      padding: 0 10px;
      font-size: 12px;
    }
    .city-pill.active { border-color: var(--focus); background: var(--focus); color: #fff; }
    .pixel-map {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 230px);
      min-height: 400px;
      shape-rendering: geometricPrecision;
    }
    .atlas-water { fill: var(--water); }
    .atlas-frame-inner { fill: rgba(255,255,255,0.42); stroke: rgba(23,37,34,0.12); stroke-width: 1; }
    .map-title { fill: var(--ink); font-size: 18px; font-weight: 700; }
    .north { fill: var(--line); font-size: 18px; font-weight: 700; }
    .route-shadow {
      fill: none;
      stroke: rgba(255,255,255,0.9);
      stroke-width: 9;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .route {
      fill: none;
      stroke: var(--route);
      stroke-width: 4.5;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .arrow-head { fill: var(--route); }
    .distance-label {
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(255,255,255,0.96);
      stroke-width: 5;
      fill: #41514d;
      font-size: 13px;
      font-weight: 700;
    }
    .city-label {
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(255,255,255,0.96);
      stroke-width: 6;
      fill: var(--focus);
      font-size: 17px;
      font-weight: 700;
    }
    .marker { cursor: pointer; outline: none; }
    .marker.context { opacity: 0.45; }
    .marker-halo { fill: rgba(20,125,117,0.12); stroke: rgba(20,125,117,0.2); stroke-width: 1; }
    .marker-box { fill: var(--marker); stroke: #fff; stroke-width: 3; }
    .marker-num { fill: #fff; font-size: 14px; font-weight: 750; pointer-events: none; }
    .poi-label {
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(255,255,255,0.98);
      stroke-width: 5;
      fill: var(--ink);
      font-size: 15px;
      font-weight: 700;
    }
    .poi-day {
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(255,255,255,0.98);
      stroke-width: 4;
      fill: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .marker.active .marker-box,
    .marker:focus .marker-box { fill: var(--marker-2); }
    .marker.active .marker-num,
    .marker:focus .marker-num { fill: var(--ink); }
    .scale-bar line { stroke: var(--line); stroke-width: 3; }
    .scale-bar text { fill: var(--line); font-size: 13px; font-weight: 700; }
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    .stat-item { padding: 10px; border-right: 1px solid var(--line); }
    .stat-item:last-child { border-right: 0; }
    .stat-item span { display: block; color: var(--muted); font-size: 11px; }
    .stat-item strong { display: block; margin-top: 4px; font-size: 15px; }
    .side-panel { display: grid; gap: 0; }
    .panel-section { padding: 14px; border-bottom: 1px solid var(--line); }
    .panel-section:last-child { border-bottom: 0; }
    .itinerary-list { display: grid; gap: 12px; max-height: 46vh; overflow: auto; padding-right: 4px; }
    .day-block { border-left: 3px solid var(--focus); padding-left: 10px; }
    .day-summary { margin-bottom: 8px; color: var(--muted); font-size: 12px; }
    .day-brief-meta {
      margin: -2px 0 8px;
      padding: 7px 9px;
      border-left: 3px solid var(--marker-2);
      color: var(--ink);
      background: #fff8dc;
      font-size: 11px;
      line-height: 1.45;
    }
    .schedule-item {
      width: 100%;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: start;
      margin: 6px 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }
    .schedule-item.active { background: #d9efeb; border-color: var(--focus); }
    .schedule-item.focus-city:not(.in-city) { opacity: 0.45; }
    .schedule-index {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      background: var(--marker);
      color: #fff;
      border: 0;
      border-radius: 50%;
      font-weight: 700;
    }
    .schedule-item small { display: block; margin-top: 2px; color: var(--muted); }
    .poi-card { min-height: 190px; }
    .poi-card h3 { margin-bottom: 8px; font-size: 20px; }
    .poi-meta { color: var(--muted); font-size: 12px; }
    .poi-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .poi-actions a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line-strong);
      border-radius: 5px;
      background: var(--paper-2);
      color: var(--ink);
      text-decoration: none;
    }
    .source-note {
      margin-top: 12px;
      padding: 8px;
      background: #f5f8f7;
      border-left: 3px solid var(--focus);
      font-size: 12px;
    }
    .empty-state { color: var(--muted); }
    .poster-tools { display: grid; gap: 14px; }
    .collaboration-tools { display: grid; gap: 9px; }
    .collaboration-actions { display: grid; gap: 8px; }
    .collaboration-status { margin: 0; color: var(--muted); font-size: 11px; line-height: 1.45; }
    .collaboration-status.ok { color: #16724b; }
    .collaboration-status.error { color: #b42318; }
    .file-button { display: grid; place-items: center; cursor: pointer; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .poster-controls,
    .notes-editor { display: grid; gap: 8px; }
    .inline-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 8px;
      align-items: center;
    }
    .field-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    select,
    textarea {
      width: 100%;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    select { min-height: 34px; padding: 0 8px; }
    textarea {
      min-height: 72px;
      padding: 8px;
      resize: vertical;
      line-height: 1.4;
    }
    input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
    }
    .briefing-view {
      display: grid;
      gap: 14px;
      max-width: 880px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 16px 40px var(--shadow);
      overflow: hidden;
    }
    .briefing-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #f5f8f7;
    }
    .briefing-toolbar h2 { margin: 0; }
    .briefing-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    #briefing-content { padding: 0 18px 20px; }
    .briefing-hero {
      display: grid;
      gap: 6px;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }
    .briefing-date { color: var(--focus); font-size: 12px; font-weight: 750; text-transform: uppercase; }
    .briefing-hero h3 { margin: 0; font-size: 26px; }
    .briefing-summary { margin: 0; color: var(--muted); line-height: 1.55; }
    .briefing-facts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 14px 0;
    }
    .briefing-fact { padding: 11px; border-left: 3px solid var(--focus); background: #f5f8f7; }
    .briefing-fact span { display: block; color: var(--muted); font-size: 11px; }
    .briefing-fact strong { display: block; margin-top: 4px; font-size: 14px; }
    .briefing-caution {
      margin: 0 0 14px;
      padding: 11px 12px;
      border-left: 3px solid #d89b17;
      background: #fff8dc;
      line-height: 1.5;
    }
    .briefing-timeline { display: grid; gap: 0; }
    .briefing-stop {
      display: grid;
      grid-template-columns: 74px 18px minmax(0, 1fr);
      gap: 10px;
      position: relative;
      padding: 0 0 18px;
    }
    .briefing-time { padding-top: 2px; color: var(--ink); font-weight: 750; }
    .briefing-rail { position: relative; }
    .briefing-rail::before {
      content: "";
      position: absolute;
      top: 8px;
      bottom: -20px;
      left: 8px;
      width: 2px;
      background: var(--line);
    }
    .briefing-stop:last-child .briefing-rail::before { display: none; }
    .briefing-dot {
      position: relative;
      z-index: 1;
      display: block;
      width: 18px;
      height: 18px;
      border: 4px solid #fff;
      border-radius: 50%;
      background: var(--marker);
      box-shadow: 0 0 0 1px var(--marker);
    }
    .briefing-stop-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }
    .briefing-stop-head { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
    .briefing-stop-head h4 { margin: 0; font-size: 15px; }
    .briefing-badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 7px 0; }
    .briefing-badge {
      display: inline-flex;
      padding: 3px 7px;
      border-radius: 999px;
      color: var(--muted);
      background: #edf3f1;
      font-size: 11px;
      font-weight: 650;
    }
    .briefing-badge.reservation { color: #845d00; background: #fff1bf; }
    .briefing-stop-card p { margin: 6px 0 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    @media (max-width: 980px) {
      .app-shell { padding: 12px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .workspace { grid-template-columns: 1fr; }
      .pixel-map { min-height: 320px; max-height: none; }
      .side-panel { grid-template-columns: 1fr; }
      .itinerary-list { max-height: none; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .stat-item { border-bottom: 2px solid var(--line); }
      .map-toolbar { align-items: flex-start; flex-direction: column; }
      .city-pills { justify-content: flex-start; }
      .inline-controls { grid-template-columns: 1fr; }
      .briefing-toolbar { align-items: flex-start; flex-direction: column; }
      .briefing-actions { width: 100%; }
      .briefing-actions select, .briefing-actions .text-button { flex: 1 1 150px; }
    }
    @media (max-width: 560px) {
      .toolbar { width: 100%; }
      .text-button { flex: 1; }
      .stats-bar { grid-template-columns: 1fr; }
      .stat-item { border-right: 0; }
      .briefing-view { margin: 0; }
      .briefing-facts { grid-template-columns: 1fr; }
      .briefing-stop { grid-template-columns: 58px 18px minmax(0, 1fr); gap: 8px; }
      #briefing-content { padding: 0 12px 16px; }
    }

  </style>
</head>

<p class="day-summary">请通过 PixelTravelMap 生成的分享链接打开此页面。</p>

                <button class="schedule-item" type="button" data-stop-index="0" data-city="PixelTravelMap">
                  <span class="schedule-index">1</span>
                  <span>
                    <strong>等待分享数据</strong>

</div>

            <p class="empty-state">点击地图编号或日程项查看详情。</p>

          <h2>Poster 工具</h2>

            <div class="inline-controls">
              <select id="poster-day-select">
                <option value="1">Day 1 · 2026-01-01</option>
              </select>
              <button class="text-button compact" id="download-day-poster" type="button">下载每日 poster</button>
            </div>
            <button class="text-button compact" id="download-record-poster" type="button">下载旅行记录 poster</button>
          </div>
          <div class="notes-editor">
            <label class="field-label" for="trip-note">全程备注 / 结束总结</label>
            <textarea id="trip-note" rows="3" placeholder="旅行前可写整体提醒；旅行后可写总结。"></textarea>
            <label class="field-label" for="day-note">当前 Day 备注</label>
            <textarea id="day-note" rows="3" placeholder="写给同行朋友的明日注意事项，或当天记录。"></textarea>
            <label class="field-label" for="stop-note">当前地点备注</label>
            <textarea id="stop-note" rows="3" placeholder="记录某个地点的临时变化、体验或提醒。"></textarea>
            <button class="text-button compact danger" id="clear-notes" type="button">清空备注</button>
          </div>

    </main>
    <section class="briefing-view" id="briefing-view" hidden>
      <div class="briefing-toolbar">
        <div>
          <p class="eyebrow">Tomorrow briefing</p>
          <h2>同行明日简报</h2>
        </div>
        <div class="briefing-actions">
          <select id="briefing-day-select" aria-label="选择简报日期">
            <option value="1">Day 1 · 2026-01-01</option>
          </select>
          <button class="text-button" id="copy-briefing-link" type="button">复制简报链接</button>
          <button class="text-button" id="briefing-back" type="button">返回地图</button>
        </div>
      </div>
      <div id="briefing-content"></div>
    </section>
  </div>
  <script>

    const SHARE_VIEWER_URL = "https://leoxin99.github.io/PixelTravelMap/dist/viewer.html";
    const embeddedTrip = JSON.parse(document.getElementById("trip-data").textContent);
    const sharedPayload = readSharePayload();
    const trip = sharedPayload && sharedPayload.trip ? expandSharedTrip(sharedPayload.trip) : embeddedTrip;
    if (sharedPayload && sharedPayload.trip) hydrateSharedTrip(trip);
    const stops = trip.days.flatMap(day => day.stops.map(stop => ({
      ...stop,
      day: day.day,
      date: day.date,
      day_summary: day.summary || ""
    })));
    stops.forEach((stop, index) => { stop.ordinal = index + 1; });
    const card = document.getElementById("poi-card");
    const viewLabel = document.getElementById("view-label");
    const mapViews = Array.from(document.querySelectorAll(".map-view"));
    const scheduleItems = Array.from(document.querySelectorAll(".schedule-item"));
    const cityButtons = Array.from(document.querySelectorAll(".city-pill"));
    const daySelect = document.getElementById("poster-day-select");
    const tripNote = document.getElementById("trip-note");
    const dayNote = document.getElementById("day-note");
    const stopNote = document.getElementById("stop-note");
    const collaboratorName = document.getElementById("collaborator-name");
    const collaborationStatus = document.getElementById("collaboration-status");
    const briefingDaySelect = document.getElementById("briefing-day-select");
    const storageKey = `PixelTravelMap:${trip.trip_title}:${trip.start_date}:${trip.end_date}`;
    let currentStopIndex = 0;
    let tripNotes = mergeTripNotes(loadTripNotes(), sharedPayload && sharedPayload.notes);

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function text(value, fallback = "") {
      return String(value ?? fallback).trim();
    }

    function trimText(value, limit) {
      const raw = text(value);
      return raw.length <= limit ? raw : `${raw.slice(0, limit - 1)}…`;
    }

    function fileSafe(value) {
      return text(value, "pixel-travel-map").replace(/[\\/:*?"<>|]+/g, "-").replace(/\s+/g, "-");
    }

    function encodeBase64Url(value) {
      const bytes = new TextEncoder().encode(value);
      let binary = "";
      bytes.forEach(byte => { binary += String.fromCharCode(byte); });
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function decodeBase64Url(value) {
      const padded = value.replace(/-/g, "+").replace(/_/g, "/") + "===".slice((value.length + 3) % 4);
      const binary = atob(padded);
      return new TextDecoder().decode(Uint8Array.from(binary, char => char.charCodeAt(0)));
    }

    function readSharePayload() {
      try {
        const params = new URLSearchParams(location.hash.replace(/^#/, ""));
        const value = params.get("ptm");
        return value ? JSON.parse(decodeBase64Url(value)) : null;
      } catch {
        return null;
      }
    }

    function compactTripForShare(source) {
      return {
        v: source.schema_version,
        t: source.trip_title,
        s: source.start_date,
        e: source.end_date,
        r: source.travelers,
        b: source.budget_cny,
        x: source.transport,
        y: source.style_theme,
        l: source.lang,
        d: source.days.map(day => [
          day.day,
          day.date,
          day.summary || "",
          day.meeting_time || null,
          day.meeting_point || "",
          day.cautions || "",
          day.stops.map(stop => [
            stop.id, stop.name, stop.name_en || null, stop.city, stop.country,
            stop.lat, stop.lon, stop.crs, stop.category, stop.duration_min,
            stop.arrival_time || null, Boolean(stop.reservation_required),
            stop.reservation_time || null, stop.reservation_reference || "",
            stop.transit_buffer_min ?? 20, stop.cautions || "",
            stop.description || null, stop.notes || "", stop.source || "shared_link",
            stop.source_url || null, stop.official_url || null,
            stop.navigation_url || null, Boolean(stop.info_missing)
          ])
        ])
      };
    }

    function expandSharedTrip(value) {
      if (value && value.schema_version && value.days) return value;
      return {
        schema_version: value.v || "1.0",
        trip_title: value.t,
        start_date: value.s,
        end_date: value.e,
        travelers: value.r || ["traveler"],
        budget_cny: value.b ?? null,
        transport: value.x || "mixed",
        style_theme: value.y || "pastel-pixel",
        lang: value.l || "zh-CN",
        days: (value.d || []).map(day => ({
          day: day[0],
          date: day[1],
          summary: day[2] || "",
          meeting_time: day[3] || null,
          meeting_point: day[4] || "",
          cautions: day[5] || "",
          stops: (day[6] || []).map(stop => ({
            id: stop[0], name: stop[1], name_en: stop[2], city: stop[3], country: stop[4],
            lat: stop[5], lon: stop[6], crs: stop[7], category: stop[8], duration_min: stop[9],
            arrival_time: stop[10] || null, reservation_required: Boolean(stop[11]),
            reservation_time: stop[12] || null, reservation_reference: stop[13] || "",
            transit_buffer_min: stop[14] ?? 20, cautions: stop[15] || "",
            description: stop[16] || null, notes: stop[17] || "", source: stop[18] || "shared_link",
            source_url: stop[19] || null, official_url: stop[20] || null,
            navigation_url: stop[21] || null, info_missing: Boolean(stop[22])
          }))
        }))
      };
    }

    function runtimeFlattenStops(source) {
      const items = [];
      source.days.forEach(day => {
        day.stops.forEach(stop => {
          items.push({
            ...stop,
            day: day.day,
            date: day.date,
            day_summary: day.summary || "",
            ordinal: items.length + 1
          });
        });
      });
      return items;
    }

    function runtimeContextForCity(items, city) {
      const selected = {};
      items.forEach((stop, index) => {
        if (stop.city !== city) return;
        [index - 1, index, index + 1].forEach(neighbor => {
          if (items[neighbor]) selected[items[neighbor].id] = items[neighbor];
        });
      });
      return Object.values(selected);
    }

    function runtimeMapViews(items) {
      const overview = projectStops(items, 1040, 620, 72);
      const views = [{
        key: "overview",
        label: "总览地图",
        stops: items,
        contextStops: items,
        ...overview
      }];
      [...new Set(items.map(stop => stop.city))].sort().forEach(city => {
        const cityStops = items.filter(stop => stop.city === city);
        const contextStops = runtimeContextForCity(items, city);
        const projected = cityStops.length > 1 ? cityStops : contextStops;
        views.push({
          key: city,
          label: `${city} detail view`,
          stops: cityStops,
          contextStops,
          ...projectStops(projected, 1040, 620, 72)
        });
      });
      return views;
    }

    function runtimeScaleBar(view) {
      const x = 48;
      const y = 572;
      return `
        <g class="scale-bar">
          <line x1="${x}" y1="${y}" x2="${x + view.scalePx}" y2="${y}"/>
          <line x1="${x}" y1="${y - 8}" x2="${x}" y2="${y + 8}"/>
          <line x1="${x + view.scalePx}" y1="${y - 8}" x2="${x + view.scalePx}" y2="${y + 8}"/>
          <text x="${x + view.scalePx / 2}" y="${y - 14}" text-anchor="middle">≈ ${view.scaleKm} km</text>
        </g>`;
    }

    function runtimeMapView(view, allStops) {
      const activeIds = new Set(view.stops.map(stop => stop.id));
      const contextIds = new Set(view.contextStops.map(stop => stop.id));
      const visible = allStops.filter(stop => contextIds.has(stop.id) && view.points[stopKey(stop)]);
      const routePoints = visible.map(stop => view.points[stopKey(stop)].join(",")).join(" ");
      const segments = visible.slice(1).map((stop, index) => {
        const start = visible[index];
        const p1 = view.points[stopKey(start)];
        const p2 = view.points[stopKey(stop)];
        return `<text class="distance-label" x="${(p1[0] + p2[0]) / 2}" y="${(p1[1] + p2[1]) / 2 - 10}" text-anchor="middle">${Math.max(1, Math.round(haversineKm(start, stop)))} km</text>`;
      }).join("");
      const cities = [...new Set(visible.map(stop => `${stop.city} · ${stop.country}`))].map(label => {
        const cityStops = visible.filter(stop => `${stop.city} · ${stop.country}` === label);
        const points = cityStops.map(stop => view.points[stopKey(stop)]);
        const x = points.reduce((sum, point) => sum + point[0], 0) / points.length;
        const y = Math.max(Math.min(...points.map(point => point[1])) - 32, 30);
        return `<text class="city-label" x="${x}" y="${y}" text-anchor="middle">${esc(label)}</text>`;
      }).join("");
      const markers = visible.map(stop => {
        const point = view.points[stopKey(stop)];
        const active = activeIds.has(stop.id);
        const labelOnLeft = point[0] > 820;
        const labelX = labelOnLeft ? point[0] - 24 : point[0] + 24;
        const labelAnchor = labelOnLeft ? "end" : "start";
        const data = active ? ` data-stop-index="${stop.ordinal - 1}" tabindex="0" role="button"` : "";
        return `
          <g class="marker marker-${esc(stop.category)}${active ? "" : " context"}"${data} aria-label="${esc(stop.name)}">
            <circle class="marker-halo" cx="${point[0]}" cy="${point[1]}" r="22"/>
            <circle class="marker-box" cx="${point[0]}" cy="${point[1]}" r="15"/>
            <text class="marker-num" x="${point[0]}" y="${point[1] + 5}" text-anchor="middle">${stop.ordinal}</text>
            <text class="poi-label" x="${labelX}" y="${point[1] - 8}" text-anchor="${labelAnchor}">${esc(trimText(stop.name, 14))}</text>
            <text class="poi-day" x="${labelX}" y="${point[1] + 10}" text-anchor="${labelAnchor}">Day ${stop.day} · ${esc(stop.city)}</text>
          </g>`;
      }).join("");
      return `
        <g class="map-view" data-view="${esc(view.key)}" style="${view.key === "overview" ? "" : "display:none"}">
          <rect width="1040" height="620" class="atlas-water"/>
          <rect width="1040" height="620" fill="url(#atlas-grid)"/>
          <rect x="28" y="28" width="984" height="564" class="atlas-frame-inner"/>
          <text x="48" y="56" class="map-title">${esc(view.label)}</text>
          <text x="992" y="56" class="north" text-anchor="end">N ↑</text>
          <polyline class="route-shadow" points="${routePoints}"/>
          <polyline class="route" points="${routePoints}" marker-mid="url(#route-arrow)" marker-end="url(#route-arrow)"/>
          ${segments}${cities}
          <g class="marker-layer" data-view="${esc(view.key)}">${markers}</g>
          ${runtimeScaleBar(view)}
        </g>`;
    }

    function runtimeMapSvg(source) {
      const items = runtimeFlattenStops(source);
      return `
        <svg id="pixel-map" class="pixel-map" viewBox="0 0 1040 620" role="img" aria-label="Latitude longitude travel atlas">
          <defs>
            <pattern id="atlas-grid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(49,61,76,0.12)" stroke-width="1"/>
            </pattern>
            <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
            </marker>
          </defs>
          ${runtimeMapViews(items).map(view => runtimeMapView(view, items)).join("")}
        </svg>`;
    }

    function runtimeItinerary(source) {
      let index = 0;
      return source.days.map(day => {
        const briefingMeta = [
          day.meeting_time ? `集合 ${day.meeting_time}` : "",
          day.meeting_point || "",
          day.cautions || ""
        ].filter(Boolean).join(" · ");
        const items = day.stops.map(stop => {
          const currentIndex = index++;
          const stopMeta = [
            stop.arrival_time || "",
            `${stop.duration_min} min`,
            stop.reservation_required ? `预约 ${stop.reservation_time || "已确认"}` : "",
            stop.transit_buffer_min ? `缓冲 ${stop.transit_buffer_min} min` : ""
          ].filter(Boolean).join(" · ");
          return `
            <button class="schedule-item" type="button" data-stop-index="${currentIndex}" data-city="${esc(stop.city)}">
              <span class="schedule-index">${currentIndex + 1}</span>
              <span><strong>${esc(stop.name)}</strong><small>${esc(stop.city)} · ${esc(stopMeta)}</small></span>
            </button>`;
        }).join("");
        return `
          <div class="day-block">
            <h3>Day ${day.day} <span>${esc(day.date)}</span></h3>
            <p class="day-summary">${esc(day.summary || "每日行程")}</p>
            ${briefingMeta ? `<p class="day-brief-meta">${esc(briefingMeta)}</p>` : ""}
            ${items}
          </div>`;
      }).join("");
    }

    function runtimeStats(source) {
      const items = runtimeFlattenStops(source);
      const budget = source.budget_cny == null ? "未填写预算" : `¥${Number(source.budget_cny).toLocaleString()}`;
      return [
        ["天数", source.days.length],
        ["城市", new Set(items.map(stop => stop.city)).size],
        ["地点", items.length],
        ["直线路线", `${totalKm(items)} km`],
        ["预算", budget]
      ].map(([label, value]) => `<div class="stat-item"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`).join("");
    }

    function hydrateSharedTrip(source) {
      document.getElementById("trip-data").textContent = JSON.stringify(source);
      document.title = `${source.trip_title} | PixelTravelMap`;
      document.querySelector("h1").textContent = source.trip_title;
      const items = runtimeFlattenStops(source);
      document.getElementById("city-pills").innerHTML =
        `<button class="city-pill active" data-view="overview">总览</button>` +
        [...new Set(items.map(stop => stop.city))].sort()
          .map(city => `<button class="city-pill" data-view="${esc(city)}">${esc(city)}</button>`)
          .join("");
      document.getElementById("pixel-map").outerHTML = runtimeMapSvg(source);
      document.getElementById("stats-bar").innerHTML = runtimeStats(source);
      document.getElementById("itinerary-list").innerHTML = runtimeItinerary(source);
      const options = source.days
        .map(day => `<option value="${day.day}">Day ${day.day} · ${esc(day.date)}</option>`)
        .join("");
      document.getElementById("poster-day-select").innerHTML = options;
      document.getElementById("briefing-day-select").innerHTML = options;
    }

    function emptyTripNotes(actor = "") {
      return {
        version: 2,
        actor,
        trip: null,
        days: {},
        stops: {},
        updatedAt: new Date(0).toISOString()
      };
    }

    function noteRecord(value, actor, updatedAt = new Date().toISOString()) {
      return { value: String(value || ""), actor: String(actor || "同行者"), updatedAt };
    }

    function noteValue(value) {
      if (typeof value === "string") return value;
      return value && typeof value.value === "string" ? value.value : "";
    }

    function normalizeTripNotes(raw) {
      if (!raw || typeof raw !== "object") return emptyTripNotes();
      if (raw.version === 2) {
        return {
          version: 2,
          actor: raw.actor || "",
          trip: raw.trip || null,
          days: raw.days || {},
          stops: raw.stops || {},
          updatedAt: raw.updatedAt || new Date(0).toISOString()
        };
      }
      const migrated = emptyTripNotes(raw.actor || "");
      if (raw.trip) migrated.trip = noteRecord(raw.trip, "旧版备注", raw.updatedAt || new Date(0).toISOString());
      Object.entries(raw.days || {}).forEach(([key, value]) => {
        migrated.days[key] = noteRecord(value, "旧版备注", raw.updatedAt || new Date(0).toISOString());
      });
      Object.entries(raw.stops || {}).forEach(([key, value]) => {
        migrated.stops[key] = noteRecord(value, "旧版备注", raw.updatedAt || new Date(0).toISOString());
      });
      return migrated;
    }

    function newerRecord(localValue, incomingValue) {
      if (!incomingValue) return localValue || null;
      if (!localValue) return incomingValue;
      const localTime = Date.parse(localValue.updatedAt || 0) || 0;
      const incomingTime = Date.parse(incomingValue.updatedAt || 0) || 0;
      return incomingTime > localTime ? incomingValue : localValue;
    }

    function mergeTripNotes(localRaw, incomingRaw) {
      const local = normalizeTripNotes(localRaw);
      const incoming = normalizeTripNotes(incomingRaw);
      const merged = emptyTripNotes(local.actor || incoming.actor || "");
      merged.trip = newerRecord(local.trip, incoming.trip);
      for (const key of new Set([...Object.keys(local.days), ...Object.keys(incoming.days)])) {
        merged.days[key] = newerRecord(local.days[key], incoming.days[key]);
      }
      for (const key of new Set([...Object.keys(local.stops), ...Object.keys(incoming.stops)])) {
        merged.stops[key] = newerRecord(local.stops[key], incoming.stops[key]);
      }
      merged.updatedAt = [local.updatedAt, incoming.updatedAt].sort().at(-1);
      return merged;
    }

    function markers() {
      return Array.from(document.querySelectorAll(".marker[data-stop-index]"));
    }

    function stopKey(stop) {
      return stop.id || `${stop.day}-${stop.name}-${stop.city}`;
    }

    function loadTripNotes() {
      try {
        return normalizeTripNotes(JSON.parse(localStorage.getItem(storageKey) || "{}"));
      } catch {
        return emptyTripNotes();
      }
    }

    function saveTripNotes() {
      tripNotes.actor = collaboratorName.value.trim();
      tripNotes.updatedAt = new Date().toISOString();
      localStorage.setItem(storageKey, JSON.stringify(tripNotes));
    }

    function selectedDayNumber() {
      return Number(daySelect.value || trip.days[0].day);
    }

    function selectedDay() {
      return trip.days.find(day => day.day === selectedDayNumber()) || trip.days[0];
    }

    function syncNoteFields() {
      collaboratorName.value = tripNotes.actor || "";
      tripNote.value = noteValue(tripNotes.trip);
      dayNote.value = noteValue(tripNotes.days[selectedDayNumber()]);
      const stop = stops[currentStopIndex];
      stopNote.value = stop ? noteValue(tripNotes.stops[stopKey(stop)]) : "";
    }

    function mapsUrl(stop) {
      if (stop.navigation_url) return stop.navigation_url;
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stop.lat + "," + stop.lon)}`;
    }

    function linkHtml(url, label) {
      if (!url) return "";
      return `<a href="${esc(url)}" target="_blank" rel="noreferrer">${esc(label)}</a>`;
    }

    function showCard(index) {
      const stop = stops[index];
      currentStopIndex = index;
      if (daySelect) daySelect.value = String(stop.day);
      markers().forEach(marker => marker.classList.toggle("active", Number(marker.dataset.stopIndex) === index));
      scheduleItems.forEach(item => item.classList.toggle("active", Number(item.dataset.stopIndex) === index));
      const missing = stop.info_missing ? "信息暂缺，建议实地查证。" : esc(stop.description || "暂无补充描述。");
      const source = stop.info_missing ? "信息暂缺" : esc(stop.source);
      const reservation = stop.reservation_required
        ? `需要预约${stop.reservation_time ? ` · ${esc(stop.reservation_time)}` : ""}${stop.reservation_reference ? ` · ${esc(stop.reservation_reference)}` : ""}`
        : "无需预约";
      card.innerHTML = `
        <p class="poi-meta">Day ${esc(stop.day)} · ${esc(stop.city)} · ${esc(stop.category)} · ${esc(stop.arrival_time || "时间待定")} · ${esc(stop.duration_min)} min</p>
        <h3>${esc(stop.name)}</h3>

    function bindMarkers() {
      markers().forEach(marker => {
        if (marker.dataset.bound === "true") return;
        marker.dataset.bound = "true";
        marker.addEventListener("click", () => showCard(Number(marker.dataset.stopIndex)));
        marker.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            showCard(Number(marker.dataset.stopIndex));
          }
        });
      });

    function showView(view) {
      const isOverview = view === "overview";
      mapViews.forEach(group => {
        group.style.display = group.dataset.view === view ? "block" : "none";

      viewLabel.textContent = isOverview ? "总览地图" : `${view} detail view`;
      cityButtons.forEach(button => button.classList.toggle("active", button.dataset.view === view));
      scheduleItems.forEach(item => {
        item.classList.toggle("focus-city", !isOverview);
        item.classList.toggle("in-city", !isOverview && item.dataset.city === view);
      });
      if (!isOverview) {
        const first = scheduleItems.find(item => item.dataset.city === view);
        if (first) showCard(Number(first.dataset.stopIndex));
      }
      bindMarkers();

    function tripIdentity() {

    function setCollaborationStatus(message, kind = "") {
      collaborationStatus.textContent = message;

    async function copyText(value) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(value);
        return;
      }
      const textarea = document.createElement("textarea");
      textarea.value = value;
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      const copied = document.execCommand("copy");
      textarea.remove();
      if (!copied) throw new Error("当前浏览器无法自动复制，请手动复制地址栏链接。");
    }

    function buildShareLink(view = "map", dayNumber = selectedDayNumber()) {
      const payload = {
        v: 2,
        trip: compactTripForShare(trip),
        notes: tripNotes,
        view,
        day: Number(dayNumber),
        sharedAt: new Date().toISOString()
      };
      const url = new URL(SHARE_VIEWER_URL);
      url.hash = `ptm=${encodeBase64Url(JSON.stringify(payload))}`;
      return url.toString();
    }

    function downloadJson(filename, value) {
      const blob = new Blob([JSON.stringify(value, null, 2)], { type: "application/json;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      URL.revokeObjectURL(a.href);
      a.remove();
    }

        format: "PixelTravelMapCollaboration",
        version: 1,
        tripIdentity: tripIdentity(),
        actor: tripNotes.actor || "同行者",
        exportedAt: new Date().toISOString(),
        notes: tripNotes

      setCollaborationStatus("协作更新包已导出，可发送给行程组织者合并。", "ok");

    async function importCollaborationPackage(file) {
      const payload = JSON.parse(await file.text());
      if (payload.format !== "PixelTravelMapCollaboration" || !payload.notes) {
        throw new Error("这不是 PixelTravelMap 协作更新包。");
      }
      if (payload.tripIdentity !== tripIdentity()) {
        throw new Error("更新包属于另一份行程，已停止导入。");
      }
      const before = JSON.stringify(tripNotes);
      tripNotes = mergeTripNotes(tripNotes, payload.notes);
      saveTripNotes();
      syncNoteFields();
      renderBriefing(selectedDayNumber());
      const changed = before !== JSON.stringify(tripNotes);
      setCollaborationStatus(
        changed ? `已合并 ${payload.actor || "同行者"} 的更新。` : "没有比本地更新的备注需要合并。",
        "ok"
      );
    }

    function downloadSvg(filename, svgText) {
      const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      URL.revokeObjectURL(a.href);
      a.remove();
    }

    function haversineKm(a, b) {
      const radius = 6371;
      const toRad = value => value * Math.PI / 180;
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const dlat = lat2 - lat1;
      const dlon = toRad(b.lon - a.lon);
      const h = Math.sin(dlat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dlon / 2) ** 2;
      return 2 * radius * Math.asin(Math.sqrt(h));
    }

    function totalKm(items) {
      return Math.round(items.slice(1).reduce((sum, stop, index) => sum + haversineKm(items[index], stop), 0));
    }

    function niceScale(maxKm) {
      if (maxKm <= 5) return 1;
      let scale = 1;
      [2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000].forEach(candidate => {
        if (candidate <= maxKm) scale = candidate;
      });
      return scale;
    }

    function projectStops(items, width, height, padding = 70) {
      const meanLat = items.reduce((sum, stop) => sum + stop.lat, 0) / Math.max(items.length, 1);
      const cosLat = Math.max(Math.cos(meanLat * Math.PI / 180), 0.18);
      const values = items.map(stop => ({ stop, x: stop.lon * cosLat, y: stop.lat }));
      const xs = values.map(item => item.x);
      const ys = values.map(item => item.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const xSpan = Math.max(maxX - minX, 0.08);
      const ySpan = Math.max(maxY - minY, 0.08);
      const drawW = width - padding * 2;
      const drawH = height - padding * 2;
      const fit = Math.min(drawW / xSpan, drawH / ySpan);
      const usedW = xSpan * fit;
      const usedH = ySpan * fit;
      const left = (width - usedW) / 2;
      const top = (height - usedH) / 2;
      const points = {};
      values.forEach(({ stop, x, y }, index) => {
        let px = Math.round((left + (x - minX) * fit) / 8) * 8;
        let py = Math.round((top + (maxY - y) * fit) / 8) * 8;
        px = Math.min(Math.max(px, 44), width - 44);
        py = Math.min(Math.max(py, 44), height - 44);
        if (points[stopKey(stop)]) {
          px += (index % 3 - 1) * 24;
          py += 22;
        }
        points[stopKey(stop)] = [px, py];
      });
      const kmPerPx = xSpan * 111.32 * cosLat / Math.max(usedW, 1);
      const scaleKm = niceScale(kmPerPx * Math.min(180, Math.max(90, drawW * 0.18)));
      const scalePx = Math.max(56, Math.round(scaleKm / Math.max(kmPerPx, 0.001)));
      return { points, scaleKm, scalePx: Math.min(scalePx, width - 160) };
    }

    function posterCss() {
      return `
        .bg{fill:#f6ecd9}.frame{fill:#fffaf0;stroke:#313d4c;stroke-width:4}
        .kicker{fill:#7a3e9d;font:700 22px Courier New,monospace}.title{fill:#26313d;font:700 42px Courier New,monospace}
        .meta,.small{fill:#697386;font:700 18px Courier New,monospace}.section{fill:#26313d;font:700 28px Courier New,monospace}
        .map-bg{fill:#d9edf0}.map-frame{fill:rgba(255,255,255,.25);stroke:#313d4c;stroke-width:2}
        .route{fill:none;stroke:#d64f3f;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:12 7}.arrow{fill:#d64f3f}
        .label{paint-order:stroke;stroke:#fffaf0;stroke-width:5;fill:#26313d;font:700 15px Courier New,monospace}
        .muted-label{paint-order:stroke;stroke:#fffaf0;stroke-width:4;fill:#697386;font:700 12px Courier New,monospace}
        .city{paint-order:stroke;stroke:#fffaf0;stroke-width:6;fill:#7a3e9d;font:700 17px Courier New,monospace}
        .distance{paint-order:stroke;stroke:#fffaf0;stroke-width:5;fill:#313d4c;font:700 13px Courier New,monospace}
        .marker-box{fill:#1f7a8c;stroke:#313d4c;stroke-width:2}.marker-num{fill:#fffaf0;font:700 16px Courier New,monospace}
        .row{fill:#fff;stroke:#313d4c;stroke-width:2}.row-title{fill:#26313d;font:700 18px Courier New,monospace}
        .row-text{fill:#697386;font:700 15px Courier New,monospace}.note{fill:#fff7d6;stroke:#313d4c;stroke-width:2;stroke-dasharray:8 6}
        .note-text{fill:#26313d;font:700 16px Courier New,monospace}.scale line{stroke:#313d4c;stroke-width:3}.scale text{fill:#313d4c;font:700 13px Courier New,monospace}
      `;
    }

    function posterDefs() {
      return `
        <defs>
          <pattern id="poster-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(49,61,76,0.12)" stroke-width="1"/>
          </pattern>
          <marker id="poster-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10z" class="arrow"/>
          </marker>
        </defs>
      `;
    }

    function routeMapSvg(items, x, y, width, height, title) {
      const mapStops = items.length ? items : stops.slice(0, 1);
      const projection = projectStops(mapStops, width, height);
      const routePoints = mapStops.map(stop => projection.points[stopKey(stop)].join(",")).join(" ");
      const segments = mapStops.slice(1).map((stop, index) => {
        const a = mapStops[index];
        const p1 = projection.points[stopKey(a)];
        const p2 = projection.points[stopKey(stop)];
        const km = Math.max(1, Math.round(haversineKm(a, stop)));
        return `<text class="distance" x="${(p1[0] + p2[0]) / 2}" y="${(p1[1] + p2[1]) / 2 - 10}" text-anchor="middle">${km} km</text>`;
      }).join("");
      const cities = [...new Set(mapStops.map(stop => `${stop.city} · ${stop.country}`))].map(cityLabel => {
        const cityStops = mapStops.filter(stop => `${stop.city} · ${stop.country}` === cityLabel);
        const pts = cityStops.map(stop => projection.points[stopKey(stop)]);
        const cx = pts.reduce((sum, point) => sum + point[0], 0) / pts.length;
        const cy = Math.max(Math.min(...pts.map(point => point[1])) - 30, 28);
        return `<text class="city" x="${cx}" y="${cy}" text-anchor="middle">${esc(cityLabel)}</text>`;
      }).join("");
      const markersSvg = mapStops.map(stop => {
        const point = projection.points[stopKey(stop)];
        const labelOnLeft = point[0] > width - 220;
        const labelX = labelOnLeft ? point[0] - 24 : point[0] + 24;
        const labelAnchor = labelOnLeft ? "end" : "start";
        return `
          <g>
            <rect class="marker-box" x="${point[0] - 15}" y="${point[1] - 15}" width="30" height="30" rx="2"/>
            <text class="marker-num" x="${point[0]}" y="${point[1] + 5}" text-anchor="middle">${stop.ordinal}</text>
            <text class="label" x="${labelX}" y="${point[1] - 8}" text-anchor="${labelAnchor}">${esc(trimText(stop.name, 14))}</text>
            <text class="muted-label" x="${labelX}" y="${point[1] + 10}" text-anchor="${labelAnchor}">Day ${stop.day} · ${esc(stop.city)}</text>
          </g>`;
      }).join("");
      return `
        <g transform="translate(${x},${y})">
          <rect width="${width}" height="${height}" class="map-bg"/>
          <rect width="${width}" height="${height}" fill="url(#poster-grid)"/>
          <rect x="28" y="28" width="${width - 56}" height="${height - 56}" class="map-frame"/>
          <text x="48" y="56" class="row-title">${esc(title)}</text>
          <text x="${width - 48}" y="56" class="row-title" text-anchor="end">N ↑</text>
          <polyline class="route" points="${routePoints}" marker-mid="url(#poster-arrow)" marker-end="url(#poster-arrow)"/>
          ${segments}${cities}${markersSvg}
          <g class="scale">
            <line x1="48" y1="${height - 48}" x2="${48 + projection.scalePx}" y2="${height - 48}"/>
            <line x1="48" y1="${height - 56}" x2="48" y2="${height - 40}"/>
            <line x1="${48 + projection.scalePx}" y1="${height - 56}" x2="${48 + projection.scalePx}" y2="${height - 40}"/>
            <text x="${48 + projection.scalePx / 2}" y="${height - 62}" text-anchor="middle">≈ ${projection.scaleKm} km</text>
          </g>
        </g>`;
    }

    function posterShell(title, subtitle, body) {
      return `<svg id="pixel-travel-dynamic-poster" xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="${esc(title)}">
        ${posterDefs()}
        <style>${posterCss()}</style>
        <rect width="1600" height="1130" class="bg"/>
        <rect x="64" y="56" width="1472" height="1018" class="frame"/>
        <text x="120" y="112" class="kicker">PixelTravelMap · offline share poster</text>
        <text x="120" y="154" class="title">${esc(trimText(title, 34))}</text>
        <text x="120" y="194" class="meta">${esc(subtitle)}</text>
        ${body}
      </svg>`;
    }

    function itineraryRows(items, x, y, width, rowHeight, limit) {
      return items.slice(0, limit).map((item, index) => {
        const rowY = y + index * rowHeight;
        return `<g transform="translate(${x},${rowY})">
          <rect width="${width}" height="${rowHeight - 8}" rx="4" class="row"/>
          <text x="20" y="25" class="row-title">${esc(item.title)}</text>
          <text x="20" y="${rowHeight - 18}" class="row-text">${esc(trimText(item.body, 105))}</text>
        </g>`;
      }).join("");
    }

    function noteBox(label, note, x, y, width, height) {
      const content = text(note) || "暂无补充备注。";
      return `<g transform="translate(${x},${y})">
        <rect width="${width}" height="${height}" rx="4" class="note"/>
        <text x="20" y="28" class="row-title">${esc(label)}</text>
        <text x="20" y="58" class="note-text">${esc(trimText(content, 96))}</text>
      </g>`;
    }

    function renderOverviewPosterSvg() {
      const rows = trip.days.map(day => ({
        title: `Day ${day.day} · ${day.date}`,
        body: `${day.summary || "行程"}：${day.stops.map(stop => `${stop.name}(${stop.city}, ${stop.duration_min}m)`).join(" · ")}`
      }));
      const subtitle = `${trip.start_date} - ${trip.end_date} · ${trip.days.length} days · ${new Set(stops.map(stop => stop.city)).size} cities · ${stops.length} stops · ${totalKm(stops)} km straight-line route`;
      const body = `
        ${routeMapSvg(stops, 120, 220, 1360, 500, "总行程路线")}
        <text x="120" y="760" class="section">完整行程</text>
        ${itineraryRows(rows, 120, 790, 1360, Math.min(58, Math.max(42, Math.floor(300 / trip.days.length))), trip.days.length)}
      `;
      return posterShell(`${trip.trip_title} · 总行程介绍`, subtitle, body);
    }

    function renderDayPosterSvg(dayNumber) {
      const day = trip.days.find(item => item.day === Number(dayNumber)) || trip.days[0];
      const dayStops = stops.filter(stop => stop.day === day.day);
      const rows = dayStops.map(stop => ({
        title: `${stop.arrival_time || stop.ordinal + "."} ${stop.name} · ${stop.city}`,
        body: `${stop.reservation_required ? `预约 ${stop.reservation_time || "已确认"} · ` : ""}停留 ${stop.duration_min} min · 缓冲 ${stop.transit_buffer_min ?? 20} min · ${stop.cautions || stop.notes || "按现场情况调整"}`
      }));
      const note = noteValue(tripNotes.days[day.day]) || day.cautions || day.summary || "";
      const body = `
        ${routeMapSvg(dayStops, 120, 220, 1360, 420, `Day ${day.day} 明日路线`)}
        <text x="120" y="690" class="section">明日具体行程</text>
        ${itineraryRows(rows, 120, 720, 1360, 58, 6)}
        ${noteBox(`集合 ${day.meeting_time || "待确认"} · ${day.meeting_point || "集合地点待确认"}`, note, 120, 1010, 1360, 70)}
      `;
      return posterShell(`${trip.trip_title} · Day ${day.day} 简报`, `${day.date} · ${day.summary || "每日行程"} · ${dayStops.length} stops · ${totalKm(dayStops)} km straight-line route`, body);
    }

    function renderRecordPosterSvg() {
      const rows = trip.days.map(day => {
        const dayStops = stops.filter(stop => stop.day === day.day);
        const dayRemark = noteValue(tripNotes.days[day.day]) || day.summary || "暂无当天记录";
        const stopRemark = dayStops.map(stop => noteValue(tripNotes.stops[stopKey(stop)])).filter(Boolean).join("；");
        return {
          title: `Day ${day.day} · ${day.date}`,
          body: stopRemark ? `${dayRemark}｜${stopRemark}` : dayRemark
        };
      });
      const body = `
        ${routeMapSvg(stops, 120, 220, 1360, 450, "旅行记录路线")}
        ${noteBox("全程总结", noteValue(tripNotes.trip), 120, 700, 1360, 86)}
        <text x="120" y="830" class="section">每日记录</text>
        ${itineraryRows(rows, 120, 860, 1360, Math.min(54, Math.max(40, Math.floor(205 / trip.days.length))), trip.days.length)}
      `;
      return posterShell(`${trip.trip_title} · 旅行记录`, `${trip.start_date} - ${trip.end_date} · 记录来自当前浏览器备注`, body);
    }

    bindMarkers();
    if (stops.length) showCard(0);
    syncNoteFields();
    briefingDaySelect.value = String((sharedPayload && sharedPayload.day) || selectedDayNumber());
    showAppView(sharedPayload && sharedPayload.view === "briefing" ? "briefing" : "map", briefingDaySelect.value);

  </script>
</body>
</html>
