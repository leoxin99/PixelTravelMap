name: CI

on:
  push:
  pull_request:

jobs:
  validate-demo-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check committed demo artifacts
        run: python scripts/check_project.py

      - name: Regenerate demo artifacts
        run: |
          python scripts/generate_map.py --input examples/inputs/italy_france_switzerland_self_drive.txt --output dist/italy_france_switzerland_demo.html --dump-json dist/italy_france_switzerland_demo.json
          python scripts/generate_map.py --input examples/inputs/japan_kansai_city_trip.txt --output dist/japan_kansai_demo.html --dump-json dist/japan_kansai_demo.json
          python scripts/generate_map.py --input examples/inputs/beijing_family_trip.txt --output dist/beijing_family_demo.html --dump-json dist/beijing_family_demo.json

      - name: Verify regenerated artifacts are committed
        run: |
          git diff --exit-code -- \
            dist/italy_france_switzerland_demo.html \
            dist/italy_france_switzerland_demo.json \
            dist/japan_kansai_demo.html \
            dist/japan_kansai_demo.json \
            dist/beijing_family_demo.html \
            dist/beijing_family_demo.json

      - name: Check regenerated demo artifacts
        run: python scripts/check_project.py
